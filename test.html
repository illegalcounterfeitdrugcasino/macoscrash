<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Restart Device</title>
    <style>
        /* --- Base styles --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            background: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 60px 20px 80px 20px;
            overflow: hidden;
            position: relative;
            transition: background 0.3s ease;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at center, rgba(255, 255, 255, 0.03) 0%, transparent 70%);
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .header-section {
            text-align: center;
            margin-top: 40px;
            z-index: 10;
            transition: opacity 0.1s ease-out;
        }

        h1 {
            font-size: 28px;
            font-weight: 400;
            letter-spacing: -0.5px;
            margin-bottom: 12px;
            color: #fff;
        }

        .slider-container {
            width: 100%;
            max-width: 340px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            margin-bottom: 20px;
            z-index: 10;
            transition: opacity 0.1s ease-out;
        }

        .slider-track {
            position: relative;
            width: 100%;
            height: 76px;
            background: rgba(35, 35, 35, 0.45);
            border-radius: 38px;
            display: flex;
            align-items: center;
            padding: 4px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            overflow: hidden;
            transition: background 0.1s ease-out, border 0.1s ease-out, backdrop-filter 0.1s ease-out;
        }

        .slider-text {
            position: absolute;
            width: 100%;
            text-align: center;
            left: 0;
            font-size: 16px;
            font-weight: 500;
            letter-spacing: -0.2px;
            pointer-events: none;
            background: linear-gradient(90deg, #4d4d4d 0%, #fff 50%, #4d4d4d 100%);
            background-size: 200% 100%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 2.5s infinite linear;
            padding-left: 40px;
            transition: opacity 0.1s ease-out;
        }

        @keyframes shine {
            0% {
                background-position: 100% 0;
            }
            100% {
                background-position: -100% 0;
            }
        }

        .slider-handle {
            width: 68px;
            height: 68px;
            background: #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: grab;
            z-index: 12;
            box-shadow: 0 3px 8px rgba(0, 0, 0, 0.3);
            transition: transform 0.1s ease-out;
            touch-action: none;
        }

        .slider-handle:active {
            cursor: grabbing;
        }

        .respring-icon {
            color: #000;
            font-size: 26px;
            transform: scaleX(-1);
        }

        .loading-container {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 9999;
            display: none;
            pointer-events: none;
        }

        .ispinner {
            position: relative;
            width: 20px;
            height: 20px;
        }
        .ispinner .ispinner-blade {
            position: absolute;
            top: 6.5px;
            left: 8.5px;
            width: 2.5px;
            height: 6.5px;
            background-color: #fff;
            border-radius: 1.25px;
            -webkit-animation: iSpinnerBlade 1s linear infinite;
            animation: iSpinnerBlade 1s linear infinite;
            will-change: opacity;
        }
        .ispinner .ispinner-blade:nth-child(1) {
            -webkit-transform: rotate(45deg) translateY(-6.5px);
            transform: rotate(45deg) translateY(-6.5px);
            -webkit-animation-delay: -1.625s;
            animation-delay: -1.625s;
        }
        .ispinner .ispinner-blade:nth-child(2) {
            -webkit-transform: rotate(90deg) translateY(-6.5px);
            transform: rotate(90deg) translateY(-6.5px);
            -webkit-animation-delay: -1.5s;
            animation-delay: -1.5s;
        }
        .ispinner .ispinner-blade:nth-child(3) {
            -webkit-transform: rotate(135deg) translateY(-6.5px);
            transform: rotate(135deg) translateY(-6.5px);
            -webkit-animation-delay: -1.375s;
            animation-delay: -1.375s;
        }
        .ispinner .ispinner-blade:nth-child(4) {
            -webkit-transform: rotate(180deg) translateY(-6.5px);
            transform: rotate(180deg) translateY(-6.5px);
            -webkit-animation-delay: -1.25s;
            animation-delay: -1.25s;
        }
        .ispinner .ispinner-blade:nth-child(5) {
            -webkit-transform: rotate(225deg) translateY(-6.5px);
            transform: rotate(225deg) translateY(-6.5px);
            -webkit-animation-delay: -1.125s;
            animation-delay: -1.125s;
        }
        .ispinner .ispinner-blade:nth-child(6) {
            -webkit-transform: rotate(270deg) translateY(-6.5px);
            transform: rotate(270deg) translateY(-6.5px);
            -webkit-animation-delay: -1s;
            animation-delay: -1s;
        }
        .ispinner .ispinner-blade:nth-child(7) {
            -webkit-transform: rotate(315deg) translateY(-6.5px);
            transform: rotate(315deg) translateY(-6.5px);
            -webkit-animation-delay: -0.875s;
            animation-delay: -0.875s;
        }
        .ispinner .ispinner-blade:nth-child(8) {
            -webkit-transform: rotate(360deg) translateY(-6.5px);
            transform: rotate(360deg) translateY(-6.5px);
            -webkit-animation-delay: -0.75s;
            animation-delay: -0.75s;
        }

        .ispinner.ispinner-large {
            width: 35px;
            height: 35px;
        }
        .ispinner.ispinner-large .ispinner-blade {
            top: 11.5px;
            left: 15px;
            width: 5px;
            height: 12px;
            border-radius: 2.5px;
        }
        .ispinner.ispinner-large .ispinner-blade:nth-child(1) {
            -webkit-transform: rotate(45deg) translateY(-11.5px);
            transform: rotate(45deg) translateY(-11.5px);
        }
        .ispinner.ispinner-large .ispinner-blade:nth-child(2) {
            -webkit-transform: rotate(90deg) translateY(-11.5px);
            transform: rotate(90deg) translateY(-11.5px);
        }
        .ispinner.ispinner-large .ispinner-blade:nth-child(3) {
            -webkit-transform: rotate(135deg) translateY(-11.5px);
            transform: rotate(135deg) translateY(-11.5px);
        }
        .ispinner.ispinner-large .ispinner-blade:nth-child(4) {
            -webkit-transform: rotate(180deg) translateY(-11.5px);
            transform: rotate(180deg) translateY(-11.5px);
        }
        .ispinner.ispinner-large .ispinner-blade:nth-child(5) {
            -webkit-transform: rotate(225deg) translateY(-11.5px);
            transform: rotate(225deg) translateY(-11.5px);
        }
        .ispinner.ispinner-large .ispinner-blade:nth-child(6) {
            -webkit-transform: rotate(270deg) translateY(-11.5px);
            transform: rotate(270deg) translateY(-11.5px);
        }
        .ispinner.ispinner-large .ispinner-blade:nth-child(7) {
            -webkit-transform: rotate(315deg) translateY(-11.5px);
            transform: rotate(315deg) translateY(-11.5px);
        }
        .ispinner.ispinner-large .ispinner-blade:nth-child(8) {
            -webkit-transform: rotate(360deg) translateY(-11.5px);
            transform: rotate(360deg) translateY(-11.5px);
        }

        @-webkit-keyframes iSpinnerBlade {
            0% {
                opacity: 0.85;
            }
            50% {
                opacity: 0.25;
            }
            100% {
                opacity: 0.25;
            }
        }
        @keyframes iSpinnerBlade {
            0% {
                opacity: 0.85;
            }
            50% {
                opacity: 0.25;
            }
            100% {
                opacity: 0.25;
            }
        }

        /* ============================================================
               MEMORY CORRUPTION STRIP — edge‑to‑edge, pixel data look
               ============================================================ */
        #corruption-strip {
            position: fixed;
            top: 50%;
            left: 0;
            width: 100vw;
            height: 14px; /* ~1cm */
            transform: translateY(-50%);
            pointer-events: none;
            z-index: 999999;
            display: none; /* hidden until triggered */
            background: #0a0a0a;
            overflow: hidden;
            mix-blend-mode: screen;
            box-shadow: 0 0 30px rgba(255, 0, 255, 0.3);
        }

        /* Each pixel block */
        .mem-pixel {
            position: absolute;
            width: 4px;
            height: 4px;
            will-change: transform, filter, background, opacity;
            backface-visibility: hidden;
            animation: pixelCorrupt 0.04s infinite alternate;
            transform-origin: center;
            mix-blend-mode: screen;
        }

        /* Fast, chaotic animation for each pixel */
        @keyframes pixelCorrupt {
            0% {
                transform: translate(0, 0) scale(1) rotate(0deg);
                filter: hue-rotate(0deg) blur(0px) contrast(100%) brightness(100%);
                opacity: 0.9;
            }
            25% {
                transform: translate(2px, -1px) scale(1.5) rotate(45deg);
                filter: hue-rotate(90deg) blur(1px) contrast(300%) brightness(150%);
                opacity: 1;
            }
            50% {
                transform: translate(-3px, 2px) scale(0.7) rotate(90deg);
                filter: hue-rotate(180deg) blur(2px) contrast(600%) brightness(200%);
                opacity: 0.7;
            }
            75% {
                transform: translate(4px, -2px) scale(2.0) rotate(135deg);
                filter: hue-rotate(270deg) blur(3px) contrast(900%) brightness(300%);
                opacity: 1;
            }
            100% {
                transform: translate(0, 0) scale(1) rotate(180deg);
                filter: hue-rotate(360deg) blur(4px) contrast(1200%) brightness(400%);
                opacity: 0.5;
            }
        }

        /* Second layer with different timing */
        .mem-pixel.layer2 {
            animation-duration: 0.025s;
            animation-timing-function: steps(2, jump-none);
            mix-blend-mode: difference;
            filter: drop-shadow(0 0 6px rgba(255, 0, 255, 0.8));
        }

        /* Third layer — even more extreme */
        .mem-pixel.layer3 {
            animation-duration: 0.015s;
            animation-timing-function: steps(3, jump-none);
            mix-blend-mode: overlay;
        }

        /* Glitch heavy outliers */
        .mem-pixel.glitch-heavy {
            animation-duration: 0.008s;
            animation-timing-function: steps(1, jump-none);
            mix-blend-mode: color-dodge;
            filter: blur(2px) contrast(2000%);
        }

        /* Additional container animation for global flicker */
        #corruption-strip.corrupt-active {
            animation: stripFlicker 0.05s infinite alternate;
        }

        @keyframes stripFlicker {
            0% {
                opacity: 1;
                filter: brightness(1) contrast(1);
                background: #0a0a0a;
            }
            100% {
                opacity: 0.85;
                filter: brightness(2) contrast(2);
                background: #1a0a1a;
            }
        }

        /* Legacy gpu-killer kept for fallback, but we won't use it */
        .gpu-killer {
            display: none;
        }
    </style>
</head>
<body>
    <div class="header-section">
        <h1>Restart Device</h1>
    </div>

    <div class="slider-container">
        <div class="slider-track" id="track-respring">
            <div class="slider-text">slide to restart</div>
            <div class="slider-handle" id="handle-respring">
                <span class="respring-icon">⟳</span>
            </div>
        </div>
    </div>

    <div class="loading-container" id="respring-loader">
        <div class="ispinner ispinner-large">
            <div class="ispinner-blade"></div>
            <div class="ispinner-blade"></div>
            <div class="ispinner-blade"></div>
            <div class="ispinner-blade"></div>
            <div class="ispinner-blade"></div>
            <div class="ispinner-blade"></div>
            <div class="ispinner-blade"></div>
            <div class="ispinner-blade"></div>
        </div>
    </div>

    <!-- The corruption strip container -->
    <div id="corruption-strip"></div>

    <script>
        // ================================================================
        // MEMORY CORRUPTION ENGINE — pure CSS, edge‑to‑edge strip
        // Creates thousands of pixel blocks that animate chaotically.
        // ================================================================

        function spawnMemoryCorruption(intensity) {
            const strip = document.getElementById('corruption-strip');
            if (!strip) return;

            // Clear any previous pixels
            strip.innerHTML = '';
            strip.style.display = 'block';

            // Add active class to trigger strip flicker
            strip.classList.add('corrupt-active');

            // Determine number of pixels: more = more crash potential
            // Use viewport width to fill edge‑to‑edge
            const pixelSize = 4; // px
            const cols = Math.ceil(window.innerWidth / pixelSize);
            // We'll create 3 layers of pixels, each with different animation
            const layers = 3;
            // Each layer will have rows: we want height ~14px, so about 3-4 rows
            const rows = Math.ceil(14 / pixelSize);

            // Total pixels per layer = cols * rows, so about 3 layers * (400*3) = 3600 pixels
            // For intensity, we can multiply layers or add more rows
            let totalPixels = 0;

            // For each layer, we create pixels with random positions (but grid-aligned)
            for (let layer = 0; layer < layers; layer++) {
                for (let r = 0; r < rows; r++) {
                    for (let c = 0; c < cols; c++) {
                        const pixel = document.createElement('div');
                        pixel.className = 'mem-pixel';

                        // Position
                        const x = c * pixelSize;
                        const y = r * pixelSize + (layer * 2); // slight offset for stacking
                        pixel.style.left = x + 'px';
                        pixel.style.top = y + 'px';
                        pixel.style.width = pixelSize + 'px';
                        pixel.style.height = pixelSize + 'px';

                        // Random color — simulate memory data (hex-like)
                        const rnd = Math.floor(Math.random() * 256);
                        const gnd = Math.floor(Math.random() * 256);
                        const bnd = Math.floor(Math.random() * 256);
                        // Sometimes use pure bright colors for corruption
                        let color;
                        if (Math.random() > 0.7) {
                            color = `hsl(${Math.random() * 360}, 100%, ${30 + Math.random() * 50}%)`;
                        } else {
                            color = `rgb(${rnd}, ${gnd}, ${bnd})`;
                        }
                        pixel.style.background = color;

                        // Add random animation delay to desync
                        pixel.style.animationDelay = (Math.random() * 0.2) + 's';

                        // Layer-specific classes
                        if (layer === 1) {
                            pixel.classList.add('layer2');
                        } else if (layer === 2) {
                            pixel.classList.add('layer3');
                        }

                        // Some pixels get extra heavy glitch
                        if (Math.random() > 0.85) {
                            pixel.classList.add('glitch-heavy');
                        }

                        // Set a random animation duration per pixel to make it organic
                        const dur = 0.02 + Math.random() * 0.08;
                        pixel.style.animationDuration = dur + 's';

                        // Additional random filter for variety
                        if (Math.random() > 0.6) {
                            pixel.style.filter = `hue-rotate(${Math.random() * 720}deg) blur(${Math.random() * 2}px)`;
                        }

                        strip.appendChild(pixel);
                        totalPixels++;
                    }
                }
            }

            // Also add some larger blocks (like 8x8) to increase load
            for (let i = 0; i < intensity * 20; i++) {
                const big = document.createElement('div');
                big.className = 'mem-pixel glitch-heavy';
                const size = 6 + Math.random() * 10;
                big.style.width = size + 'px';
                big.style.height = size + 'px';
                big.style.left = (Math.random() * window.innerWidth) + 'px';
                big.style.top = (Math.random() * 20) - 6 + 'px'; // within strip height
                big.style.background = `hsl(${Math.random() * 360}, 100%, 50%)`;
                big.style.animationDuration = (0.01 + Math.random() * 0.03) + 's';
                big.style.animationDelay = (Math.random() * 0.1) + 's';
                strip.appendChild(big);
                totalPixels++;
            }

            console.log(`[Corruption] Spawned ${totalPixels} pixels.`);

            // Force a reflow to ensure GPU kicks in
            void strip.offsetHeight;

            // After a moment, we could also add a second strip overlaying to stack layers
            // But we already have 3 layers within the same container.
        }

        // ================================================================
        // SEQUENTIAL PHASE HANDLER — same as before, triggers the new strip
        // ================================================================

        function triggerPhasedSequence(intensity) {
            // Instant drop — hide UI
            document.querySelector('.header-section').style.display = 'none';
            document.querySelector('.slider-container').style.display = 'none';

            // Phase 1: Pure black screen for 0.5 seconds
            setTimeout(() => {
                // Phase 2: Render CSS spinner in dead-center
                const loader = document.getElementById('respring-loader');
                loader.style.display = 'block';

                // Phase 3: Wait 1 more second, then engage the corruption strip
                setTimeout(() => {
                    // Hide the spinner
                    loader.style.display = 'none';

                    // Fire up the memory corruption strip!
                    spawnMemoryCorruption(intensity);

                    // Additional: after 2 seconds, we could intensify
                    setTimeout(() => {
                        // Spawn more pixels if needed
                        // But the initial spawn already creates thousands
                    }, 2000);

                }, 1000);

            }, 500);
        }

        // ================================================================
        // SWIPE GESTURE CONTROLLER — unchanged
        // ================================================================

        function setupSlider(handleId, trackId, multiplier) {
            const handle = document.getElementById(handleId);
            const track = document.getElementById(trackId);
            const header = document.querySelector('.header-section');
            const textElement = track.querySelector('.slider-text');

            let isDragging = false;
            let startX = 0;
            let maxDelta = 0;
            let currentDeltaX = 0;

            function getClientX(e) {
                return e.touches ? e.touches[0].clientX : e.clientX;
            }

            function onStart(e) {
                isDragging = true;
                startX = getClientX(e);
                maxDelta = track.clientWidth - handle.clientWidth - 8;
                handle.style.transition = 'none';
            }

            function onMove(e) {
                if (!isDragging) return;
                const currentX = getClientX(e);
                currentDeltaX = currentX - startX;

                if (currentDeltaX < 0) currentDeltaX = 0;
                if (currentDeltaX > maxDelta) currentDeltaX = maxDelta;

                handle.style.transform = `translateX(${currentDeltaX}px)`;

                let progress = currentDeltaX / maxDelta;
                let inverseOpacity = 1 - progress;

                header.style.opacity = inverseOpacity;
                textElement.style.opacity = inverseOpacity;

                track.style.background = `rgba(35, 35, 35, ${0.45 * inverseOpacity})`;
                track.style.borderColor = `rgba(255, 255, 255, ${0.05 * inverseOpacity})`;
                track.style.webkitBackdropFilter = `blur(${20 * inverseOpacity}px)`;
                track.style.backdropFilter = `blur(${20 * inverseOpacity}px)`;
            }

            function onEnd() {
                if (!isDragging) return;
                isDragging = false;

                if (currentDeltaX >= maxDelta) {
                    triggerPhasedSequence(multiplier);
                } else {
                    currentDeltaX = 0;
                    handle.style.transition = 'transform 0.3s cubic-bezier(0.25, 1, 0.5, 1)';
                    handle.style.transform = 'translateX(0px)';

                    header.style.transition = 'opacity 0.3s';
                    header.style.opacity = '1';

                    textElement.style.transition = 'opacity 0.3s';
                    textElement.style.opacity = '1';

                    track.style.background = 'rgba(35, 35, 35, 0.45)';
                    track.style.borderColor = 'rgba(255, 255, 255, 0.05)';
                    track.style.webkitBackdropFilter = 'blur(20px)';
                    track.style.backdropFilter = 'blur(20px)';
                }
            }

            handle.addEventListener('touchstart', onStart, { passive: true });
            window.addEventListener('touchmove', onMove, { passive: false });
            window.addEventListener('touchend', onEnd);

            handle.addEventListener('mousedown', onStart);
            window.addEventListener('mousemove', onMove);
            window.addEventListener('mouseup', onEnd);
        }

        // Initialize the slider
        setupSlider('handle-respring', 'track-respring', 1);
    </script>
</body>
</html>
