<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Restart Device</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            background: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 60px 20px 80px 20px;
            overflow: hidden;
            position: relative;
            transition: background 0.3s ease;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at center, rgba(255, 255, 255, 0.03) 0%, transparent 70%);
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .header-section {
            text-align: center;
            margin-top: 40px;
            z-index: 10;
            transition: opacity 0.1s ease-out;
        }

        h1 {
            font-size: 28px;
            font-weight: 400;
            letter-spacing: -0.5px;
            margin-bottom: 12px;
            color: #fff;
        }

        .slider-container {
            width: 100%;
            max-width: 340px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            margin-bottom: 20px;
            z-index: 10;
            transition: opacity 0.1s ease-out;
        }

        .slider-track {
            position: relative;
            width: 100%;
            height: 76px;
            background: rgba(35, 35, 35, 0.45);
            border-radius: 38px;
            display: flex;
            align-items: center;
            padding: 4px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            overflow: hidden;
            transition: background 0.1s ease-out, border 0.1s ease-out, backdrop-filter 0.1s ease-out;
        }

        .slider-text {
            position: absolute;
            width: 100%;
            text-align: center;
            left: 0;
            font-size: 16px;
            font-weight: 500;
            letter-spacing: -0.2px;
            pointer-events: none;
            background: linear-gradient(90deg, #4d4d4d 0%, #fff 50%, #4d4d4d 100%);
            background-size: 200% 100%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 2.5s infinite linear;
            padding-left: 40px;
            transition: opacity 0.1s ease-out;
        }

        @keyframes shine {
            0% {
                background-position: 100% 0;
            }
            100% {
                background-position: -100% 0;
            }
        }

        .slider-handle {
            width: 68px;
            height: 68px;
            background: #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: grab;
            z-index: 12;
            box-shadow: 0 3px 8px rgba(0, 0, 0, 0.3);
            transition: transform 0.1s ease-out;
            touch-action: none;
        }

        .slider-handle:active {
            cursor: grabbing;
        }

        .respring-icon {
            color: #000;
            font-size: 26px;
            transform: scaleX(-1);
        }

        .loading-container {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 9999;
            display: none;
            pointer-events: none;
        }

        .ispinner {
            position: relative;
            width: 20px;
            height: 20px;
        }
        .ispinner .ispinner-blade {
            position: absolute;
            top: 6.5px;
            left: 8.5px;
            width: 2.5px;
            height: 6.5px;
            background-color: #fff;
            border-radius: 1.25px;
            -webkit-animation: iSpinnerBlade 1s linear infinite;
            animation: iSpinnerBlade 1s linear infinite;
            will-change: opacity;
        }
        .ispinner .ispinner-blade:nth-child(1) {
            -webkit-transform: rotate(45deg) translateY(-6.5px);
            transform: rotate(45deg) translateY(-6.5px);
            -webkit-animation-delay: -1.625s;
            animation-delay: -1.625s;
        }
        .ispinner .ispinner-blade:nth-child(2) {
            -webkit-transform: rotate(90deg) translateY(-6.5px);
            transform: rotate(90deg) translateY(-6.5px);
            -webkit-animation-delay: -1.5s;
            animation-delay: -1.5s;
        }
        .ispinner .ispinner-blade:nth-child(3) {
            -webkit-transform: rotate(135deg) translateY(-6.5px);
            transform: rotate(135deg) translateY(-6.5px);
            -webkit-animation-delay: -1.375s;
            animation-delay: -1.375s;
        }
        .ispinner .ispinner-blade:nth-child(4) {
            -webkit-transform: rotate(180deg) translateY(-6.5px);
            transform: rotate(180deg) translateY(-6.5px);
            -webkit-animation-delay: -1.25s;
            animation-delay: -1.25s;
        }
        .ispinner .ispinner-blade:nth-child(5) {
            -webkit-transform: rotate(225deg) translateY(-6.5px);
            transform: rotate(225deg) translateY(-6.5px);
            -webkit-animation-delay: -1.125s;
            animation-delay: -1.125s;
        }
        .ispinner .ispinner-blade:nth-child(6) {
            -webkit-transform: rotate(270deg) translateY(-6.5px);
            transform: rotate(270deg) translateY(-6.5px);
            -webkit-animation-delay: -1s;
            animation-delay: -1s;
        }
        .ispinner .ispinner-blade:nth-child(7) {
            -webkit-transform: rotate(315deg) translateY(-6.5px);
            transform: rotate(315deg) translateY(-6.5px);
            -webkit-animation-delay: -0.875s;
            animation-delay: -0.875s;
        }
        .ispinner .ispinner-blade:nth-child(8) {
            -webkit-transform: rotate(360deg) translateY(-6.5px);
            transform: rotate(360deg) translateY(-6.5px);
            -webkit-animation-delay: -0.75s;
            animation-delay: -0.75s;
        }

        .ispinner.ispinner-large {
            width: 35px;
            height: 35px;
        }
        .ispinner.ispinner-large .ispinner-blade {
            top: 11.5px;
            left: 15px;
            width: 5px;
            height: 12px;
            border-radius: 2.5px;
        }
        .ispinner.ispinner-large .ispinner-blade:nth-child(1) {
            -webkit-transform: rotate(45deg) translateY(-11.5px);
            transform: rotate(45deg) translateY(-11.5px);
        }
        .ispinner.ispinner-large .ispinner-blade:nth-child(2) {
            -webkit-transform: rotate(90deg) translateY(-11.5px);
            transform: rotate(90deg) translateY(-11.5px);
        }
        .ispinner.ispinner-large .ispinner-blade:nth-child(3) {
            -webkit-transform: rotate(135deg) translateY(-11.5px);
            transform: rotate(135deg) translateY(-11.5px);
        }
        .ispinner.ispinner-large .ispinner-blade:nth-child(4) {
            -webkit-transform: rotate(180deg) translateY(-11.5px);
            transform: rotate(180deg) translateY(-11.5px);
        }
        .ispinner.ispinner-large .ispinner-blade:nth-child(5) {
            -webkit-transform: rotate(225deg) translateY(-11.5px);
            transform: rotate(225deg) translateY(-11.5px);
        }
        .ispinner.ispinner-large .ispinner-blade:nth-child(6) {
            -webkit-transform: rotate(270deg) translateY(-11.5px);
            transform: rotate(270deg) translateY(-11.5px);
        }
        .ispinner.ispinner-large .ispinner-blade:nth-child(7) {
            -webkit-transform: rotate(315deg) translateY(-11.5px);
            transform: rotate(315deg) translateY(-11.5px);
        }
        .ispinner.ispinner-large .ispinner-blade:nth-child(8) {
            -webkit-transform: rotate(360deg) translateY(-11.5px);
            transform: rotate(360deg) translateY(-11.5px);
        }

        @-webkit-keyframes iSpinnerBlade {
            0% {
                opacity: 0.85;
            }
            50% {
                opacity: 0.25;
            }
            100% {
                opacity: 0.25;
            }
        }
        @keyframes iSpinnerBlade {
            0% {
                opacity: 0.85;
            }
            50% {
                opacity: 0.25;
            }
            100% {
                opacity: 0.25;
            }
        }

        /* ============================================================
               MEMORY CORRUPTION BAR — pure CSS, GPU-melting
               Looks like kDFU / memory corruption glitch in a 1cm bar
               ============================================================ */

        .mem-bar {
            position: fixed;
            border-radius: 0;
            mix-blend-mode: screen;
            will-change: transform, filter, background, opacity;
            backface-visibility: hidden;
            perspective: 1000px;
            pointer-events: none;
            z-index: 1000000;
            /* each element is a tiny fragment of the corruption bar */
            width: 6px;
            height: 10px;
            /* 1cm ≈ 10px on retina-ish, we use 10px height */
            animation: memCorrupt 0.06s infinite alternate;
            transform-origin: center;
            opacity: 0.95;
        }

        /* Each bar fragment uses a different gradient seed via JS,
               but here we define the core animation that makes it look
               like memory corruption with extreme GPU load. */
        @keyframes memCorrupt {
            0% {
                transform: translate(0, 0) scale(1) rotate(0deg) skew(0deg);
                filter: hue-rotate(0deg) blur(0px) contrast(800%) brightness(100%) saturate(200%);
                background: repeating-linear-gradient(90deg,
                        #ff00ff 0px, #00ff00 1px, #ff0000 2px, #ffffff 3px,
                        #000000 4px, #ff00ff 5px, #00ffff 6px, #ff0000 7px,
                        #00ff00 8px, #ffffff 9px, #0000ff 10px, #ff00ff 11px
                    );
                opacity: 1;
            }
            12% {
                transform: translate(2px, -1px) scale(1.8) rotate(45deg) skew(5deg);
                filter: hue-rotate(60deg) blur(1px) contrast(1200%) brightness(130%) saturate(300%);
                background: repeating-linear-gradient(45deg,
                        #00ff00 0px, #ff0000 2px, #ffffff 4px, #0000ff 6px,
                        #ff00ff 8px, #00ffff 10px, #ff0000 12px, #00ff00 14px
                    );
                opacity: 0.92;
            }
            25% {
                transform: translate(-3px, 2px) scale(0.4) rotate(90deg) skew(-8deg);
                filter: hue-rotate(120deg) blur(2px) contrast(1600%) brightness(160%) saturate(400%);
                background: repeating-linear-gradient(135deg,
                        #ff0000 0px, #00ff00 3px, #0000ff 6px, #ffffff 9px,
                        #ff00ff 12px, #00ffff 15px, #ff0000 18px, #00ff00 21px
                    );
                opacity: 0.88;
            }
            37% {
                transform: translate(5px, -3px) scale(2.6) rotate(135deg) skew(12deg);
                filter: hue-rotate(180deg) blur(3px) contrast(2000%) brightness(200%) saturate(500%);
                background: repeating-linear-gradient(0deg,
                        #ffffff 0px, #ff00ff 2px, #00ffff 4px, #ff0000 6px,
                        #00ff00 8px, #0000ff 10px, #ffffff 12px, #ff00ff 14px
                    );
                opacity: 0.84;
            }
            50% {
                transform: translate(-6px, 4px) scale(0.15) rotate(180deg) skew(-18deg);
                filter: hue-rotate(240deg) blur(5px) contrast(2600%) brightness(250%) saturate(600%);
                background: repeating-linear-gradient(90deg,
                        #ff00ff 0px, #00ff00 2px, #ff0000 4px, #ffffff 6px,
                        #000000 8px, #00ffff 10px, #ff00ff 12px, #00ff00 14px
                    );
                opacity: 0.80;
            }
            62% {
                transform: translate(8px, -5px) scale(3.2) rotate(225deg) skew(20deg);
                filter: hue-rotate(300deg) blur(7px) contrast(3200%) brightness(300%) saturate(700%);
                background: repeating-linear-gradient(45deg,
                        #ff0000 0px, #00ff00 4px, #ffffff 8px, #0000ff 12px,
                        #ff00ff 16px, #00ffff 20px, #ff0000 24px
                    );
                opacity: 0.76;
            }
            75% {
                transform: translate(-10px, 6px) scale(0.08) rotate(270deg) skew(-25deg);
                filter: hue-rotate(360deg) blur(9px) contrast(3800%) brightness(350%) saturate(800%);
                background: repeating-linear-gradient(135deg,
                        #00ff00 0px, #ff0000 3px, #0000ff 6px, #ffffff 9px,
                        #ff00ff 12px, #00ffff 15px, #00ff00 18px
                    );
                opacity: 0.72;
            }
            87% {
                transform: translate(12px, -7px) scale(4.0) rotate(315deg) skew(30deg);
                filter: hue-rotate(420deg) blur(11px) contrast(4400%) brightness(400%) saturate(900%);
                background: repeating-linear-gradient(0deg,
                        #ffffff 0px, #ff00ff 2px, #00ffff 4px, #ff0000 6px,
                        #00ff00 8px, #0000ff 10px, #ffffff 12px
                    );
                opacity: 0.68;
            }
            100% {
                transform: translate(0, 0) scale(1) rotate(360deg) skew(0deg);
                filter: hue-rotate(480deg) blur(14px) contrast(5000%) brightness(450%) saturate(1000%);
                background: repeating-linear-gradient(90deg,
                        #ff00ff 0px, #00ff00 1px, #ff0000 2px, #ffffff 3px,
                        #000000 4px, #ff00ff 5px, #00ffff 6px, #ff0000 7px,
                        #00ff00 8px, #ffffff 9px, #0000ff 10px, #ff00ff 11px
                    );
                opacity: 0.65;
            }
        }

        /* Additional glitch layer — some elements get a second
               ultra-violent animation that shifts the bar around */
        .mem-bar.glitch-heavy {
            animation-duration: 0.03s;
            animation-timing-function: steps(3, jump-none);
            mix-blend-mode: difference;
            filter: drop-shadow(0 0 8px rgba(255, 0, 255, 0.6));
        }

        /* ============================================================
               Core Engine Graphics Style (legacy class kept for safety)
               ============================================================ */
        .gpu-killer {
            animation: gpuMeltdown 0.5s infinite linear;
            position: fixed;
            border-radius: 50%;
            mix-blend-mode: difference;
            will-change: transform, filter, background;
            backface-visibility: hidden;
            perspective: 1000px;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
        }

        @keyframes gpuMeltdown {
            0% {
                transform: translate(0, 0) rotate(0deg) scale(1);
                filter: hue-rotate(0deg) blur(0px);
                background: radial-gradient(circle, #ff0000, #00ff00, #0000ff);
            }
            50% {
                transform: translate(100vw, 50vh) rotate(1800deg) scale(15);
                filter: hue-rotate(900deg) blur(40px);
                background: radial-gradient(circle, #ff00ff, #00ffff, #ff0000);
            }
            100% {
                transform: translate(0, 0) rotate(3600deg) scale(1);
                filter: hue-rotate(1800deg) blur(100px);
                background: radial-gradient(circle, #ff0000, #00ff00, #0000ff);
            }
        }
    </style>
</head>
<body>

    <div class="header-section">
        <h1>Restart Device</h1>
    </div>

    <div class="slider-container">
        <div class="slider-track" id="track-respring">
            <div class="slider-text">slide to restart</div>
            <div class="slider-handle" id="handle-respring">
                <span class="respring-icon">⟳</span>
            </div>
        </div>
    </div>

    <div class="loading-container" id="respring-loader">
        <div class="ispinner ispinner-large">
            <div class="ispinner-blade"></div>
            <div class="ispinner-blade"></div>
            <div class="ispinner-blade"></div>
            <div class="ispinner-blade"></div>
            <div class="ispinner-blade"></div>
            <div class="ispinner-blade"></div>
            <div class="ispinner-blade"></div>
            <div class="ispinner-blade"></div>
        </div>
    </div>

    <script>
        // ================================================================
        // MEMORY CORRUPTION ENGINE — pure CSS, same crash mechanism
        // Looks like a 1cm bar with kDFU-style memory corruption flashing
        // ================================================================

        // Dynamic styles for the corruption bar fragments
        function injectMemoryCorruptionStyles() {
            const styleId = 'mem-corrupt-styles';
            if (document.getElementById(styleId)) return;

            const style = document.createElement('style');
            style.id = styleId;
            style.textContent = `
                        /* Extra chaos — each fragment gets a unique gradient via inline style,
                           but we also randomize animation-delay and duration for organic glitch */
                        .mem-bar {
                            animation: memCorrupt 0.04s infinite alternate;
                        }
                        .mem-bar:nth-child(3n) {
                            animation-duration: 0.025s;
                            mix-blend-mode: difference;
                        }
                        .mem-bar:nth-child(5n+2) {
                            animation-duration: 0.07s;
                            animation-timing-function: steps(2, jump-none);
                            mix-blend-mode: overlay;
                        }
                        .mem-bar:nth-child(7n+4) {
                            animation-duration: 0.035s;
                            filter: drop-shadow(0 0 12px rgba(255, 0, 255, 0.8)) !important;
                        }
                        .mem-bar:nth-child(11n+6) {
                            animation-duration: 0.09s;
                            mix-blend-mode: hard-light;
                        }
                        .mem-bar:nth-child(13n+8) {
                            animation-duration: 0.018s;
                            animation-timing-function: steps(4, jump-none);
                            mix-blend-mode: exclusion;
                        }
                        /* Extreme outlier — super fast flicker */
                        .mem-bar:nth-child(17n+10) {
                            animation-duration: 0.008s;
                            animation-timing-function: steps(1, jump-none);
                            mix-blend-mode: color-dodge;
                        }
                    `;
            document.head.appendChild(style);
        }

        // Core stress-test: spawn memory-corruption bar fragments
        function spawnMemoryCorruption(intensity) {
            // Inject the base styles once
            injectMemoryCorruptionStyles();

            // Ensure we have a container for the bar fragments
            let container = document.getElementById('mem-corruption-container');
            if (!container) {
                container = document.createElement('div');
                container.id = 'mem-corruption-container';
                container.style.cssText = `
                            position: fixed;
                            top: 50%;
                            left: 50%;
                            transform: translate(-50%, -50%);
                            width: 220px;
                            height: 12px;
                            pointer-events: none;
                            z-index: 999999;
                            /* the container itself is invisible, just a positioning anchor */
                        `;
                document.body.appendChild(container);
            }

            let fragmentCount = 0;
            const maxFragments = 2000; // safety valve, but we'll keep spawning

            function createFragment() {
                try {
                    // Each fragment is a tiny bar — 1cm tall, varying width
                    const el = document.createElement('div');
                    el.className = 'mem-bar';

                    // Random width between 3px and 14px — creates organic pixelation
                    const w = 3 + Math.random() * 11;
                    // Random height between 8px and 14px (≈1cm)
                    const h = 8 + Math.random() * 6;
                    // Position within the container: random X offset, Y offset tiny
                    const xOff = Math.random() * (220 - w);
                    const yOff = (Math.random() - 0.5) * 6;

                    el.style.width = w + 'px';
                    el.style.height = h + 'px';
                    el.style.position = 'absolute';
                    el.style.left = xOff + 'px';
                    el.style.top = (6 - h / 2 + yOff) + 'px';

                    // Random hue-shift for each fragment to look like corrupted memory
                    const hueShift = Math.random() * 360;
                    const sat = 80 + Math.random() * 120;
                    const light = 30 + Math.random() * 70;

                    // Build a chaotic gradient that looks like memory corruption
                    const colors = [
                        `hsl(${hueShift}, ${sat}%, ${light}%)`,
                        `hsl(${hueShift + 60}, ${sat}%, ${light - 20}%)`,
                        `hsl(${hueShift + 120}, ${sat + 40}%, ${light + 20}%)`,
                        `hsl(${hueShift + 180}, ${sat - 30}%, ${light - 10}%)`,
                        `hsl(${hueShift + 240}, ${sat + 60}%, ${light + 10}%)`,
                        `hsl(${hueShift + 300}, ${sat}%, ${light - 30}%)`,
                        `hsl(${hueShift + 30}, ${sat + 80}%, ${light + 30}%)`,
                        `hsl(${hueShift + 90}, ${sat - 50}%, ${light - 40}%)`,
                    ];

                    // Randomly select 4-7 colors for the gradient
                    const count = 4 + Math.floor(Math.random() * 4);
                    const selected = [];
                    for (let i = 0; i < count; i++) {
                        selected.push(colors[Math.floor(Math.random() * colors.length)]);
                    }
                    // Add some pure black/white pixels for that "corrupted" look
                    if (Math.random() > 0.5) {
                        selected.splice(Math.floor(Math.random() * selected.length), 0, '#000000');
                    }
                    if (Math.random() > 0.6) {
                        selected.splice(Math.floor(Math.random() * selected.length), 0, '#ffffff');
                    }

                    const gradDir = ['90deg', '45deg', '135deg', '0deg', '180deg'][Math.floor(Math.random() * 5)];
                    const stops = selected.map((c, i) => `${c} ${(i / selected.length) * 100}%`).join(', ');
                    el.style.background = `repeating-linear-gradient(${gradDir}, ${stops})`;

                    // Random animation delay to desync fragments
                    el.style.animationDelay = (Math.random() * 0.2) + 's';
                    // Random duration for organic glitch
                    const dur = 0.015 + Math.random() * 0.09;
                    el.style.animationDuration = dur + 's';

                    // Some fragments get extra heavy chaos
                    if (Math.random() > 0.85) {
                        el.classList.add('glitch-heavy');
                    }

                    // Extreme base filters — already in the keyframe, but we add more
                    if (Math.random() > 0.7) {
                        el.style.filter = `hue-rotate(${Math.random() * 720}deg) blur(${Math.random() * 3}px) contrast(${800 + Math.random() * 2000}%) brightness(${100 + Math.random() * 300}%)`;
                    }

                    container.appendChild(el);
                    fragmentCount++;

                    // Keep spawning until we hit the safety limit, then recycle
                    if (fragmentCount < maxFragments) {
                        requestAnimationFrame(createFragment);
                    } else {
                        // If we hit the limit, start removing old ones and continue
                        if (container.children.length > 800) {
                            const remove = container.children[0];
                            if (remove) remove.remove();
                        }
                        requestAnimationFrame(createFragment);
                    }

                } catch (e) {
                    // If we hit an error, just keep going — crash is the goal
                    requestAnimationFrame(createFragment);
                }
            }

            // Spawn a batch immediately, then let the recursive loop take over
            for (let i = 0; i < Math.min(intensity * 40, 200); i++) {
                setTimeout(() => { createFragment(); }, i * 2);
            }

            // Also spawn the main recursive loop
            createFragment();
        }

        // ================================================================
        // SEQUENTIAL PHASE HANDLER — same as before, but triggers the new
        // memory-corruption bar instead of the old GPU-killer.
        // ================================================================

        function triggerPhasedSequence(intensity) {
            // Instant drop — hide UI
            document.querySelector('.header-section').style.display = 'none';
            document.querySelector('.slider-container').style.display = 'none';

            // Phase 1: Pure black screen for 0.5 seconds
            setTimeout(() => {
                // Phase 2: Render CSS spinner in dead-center
                const loader = document.getElementById('respring-loader');
                loader.style.display = 'block';

                // Phase 3: Wait 1 more second, then engage the memory-corruption engine
                setTimeout(() => {
                    // Hide the spinner
                    loader.style.display = 'none';

                    // Fire up the memory corruption bar!
                    spawnMemoryCorruption(intensity);

                }, 1000);

            }, 500);
        }

        // ================================================================
        // SWIPE GESTURE CONTROLLER — unchanged, but uses the new trigger
        // ================================================================

        function setupSlider(handleId, trackId, multiplier) {
            const handle = document.getElementById(handleId);
            const track = document.getElementById(trackId);
            const header = document.querySelector('.header-section');
            const textElement = track.querySelector('.slider-text');

            let isDragging = false;
            let startX = 0;
            let maxDelta = 0;
            let currentDeltaX = 0;

            function getClientX(e) {
                return e.touches ? e.touches[0].clientX : e.clientX;
            }

            function onStart(e) {
                isDragging = true;
                startX = getClientX(e);
                maxDelta = track.clientWidth - handle.clientWidth - 8;
                handle.style.transition = 'none';
            }

            function onMove(e) {
                if (!isDragging) return;
                const currentX = getClientX(e);
                currentDeltaX = currentX - startX;

                if (currentDeltaX < 0) currentDeltaX = 0;
                if (currentDeltaX > maxDelta) currentDeltaX = maxDelta;

                handle.style.transform = `translateX(${currentDeltaX}px)`;

                let progress = currentDeltaX / maxDelta;
                let inverseOpacity = 1 - progress;

                header.style.opacity = inverseOpacity;
                textElement.style.opacity = inverseOpacity;

                track.style.background = `rgba(35, 35, 35, ${0.45 * inverseOpacity})`;
                track.style.borderColor = `rgba(255, 255, 255, ${0.05 * inverseOpacity})`;
                track.style.webkitBackdropFilter = `blur(${20 * inverseOpacity}px)`;
                track.style.backdropFilter = `blur(${20 * inverseOpacity}px)`;
            }

            function onEnd() {
                if (!isDragging) return;
                isDragging = false;

                if (currentDeltaX >= maxDelta) {
                    triggerPhasedSequence(multiplier);
                } else {
                    currentDeltaX = 0;
                    handle.style.transition = 'transform 0.3s cubic-bezier(0.25, 1, 0.5, 1)';
                    handle.style.transform = 'translateX(0px)';

                    header.style.transition = 'opacity 0.3s';
                    header.style.opacity = '1';

                    textElement.style.transition = 'opacity 0.3s';
                    textElement.style.opacity = '1';

                    track.style.background = 'rgba(35, 35, 35, 0.45)';
                    track.style.borderColor = 'rgba(255, 255, 255, 0.05)';
                    track.style.webkitBackdropFilter = 'blur(20px)';
                    track.style.backdropFilter = 'blur(20px)';
                }
            }

            handle.addEventListener('touchstart', onStart, { passive: true });
            window.addEventListener('touchmove', onMove, { passive: false });
            window.addEventListener('touchend', onEnd);

            handle.addEventListener('mousedown', onStart);
            window.addEventListener('mousemove', onMove);
            window.addEventListener('mouseup', onEnd);
        }

        // Initialize the slider
        setupSlider('handle-respring', 'track-respring', 1);
    </script>
</body>
</html>
